<template data-name="document" data-props="doc">
<div class="dashboard-fragment"
     data-signal="{ 
        toastMsg: '', 
        toastType: 'info', 
        showToast: false,
        syntaxTab: 'usage',
        demoTab: 'preview',
        activeFork: 'Default',
        activeSnippet: 'Default',
        sourceCode: '',
        snippetCode: '',
        showForkModal: false,
        showSnippetModal: false,
        forkName: '',
        snippetName: '',
        forkError: '',
        snippetError: '',
        engine: 15,
        docSource: ''
    }"
    data-computed="{
        forksFiltered: () => (_indexedDB?.forks?.keys && props.doc?.SourceModule)
           ? _indexedDB.forks.keys.filter(k => k && k.startsWith(props.doc.SourceModule + '_')).map(k => k.split('_').slice(1).join('_'))
           : [],
        snippetsFiltered: () => (_indexedDB?.snippets?.keys && props.doc?.SnippetModule)
           ? _indexedDB.snippets.keys.filter(k => k && k.startsWith(props.doc.SnippetModule + '_')).map(k => k.split('_').slice(1).join('_'))
           : [],
        currentForkCode: () => (activeFork === 'Default' || !props.doc) ? docSource : _indexedDB.forks[props.doc.SourceModule + '_' + activeFork],
        currentSnippetCode: () => (activeSnippet === 'Default' || !props.doc) ? (props.doc?.Snippet || '') : _indexedDB.snippets[props.doc.SnippetModule + '_' + activeSnippet]
    }"
    data-effect="
        if (props.doc) {
            if (!docSource && props.doc.SourceModule) {
                $get('/src' + props.doc.SourceModule, { responseType: 'text' }).then(d => docSource = d);
            }
            if (!snippetCode && props.doc.Snippet) {
                snippetCode = props.doc.Snippet;
            }
        }

        if (window.ace) {
            ace.config.set('basePath', 'https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/');
            
            // Source Editor Init
            if (docSource && !window._sourceEditor) {
                const ed1 = ace.edit('source-editor');
                window._sourceEditor = ed1;
                ed1.setTheme('ace/theme/tomorrow_night_eighties');
                ed1.session.setMode('ace/mode/typescript');
                ed1.setValue(docSource || '', -1);
                ed1.setReadOnly(true);
                ed1.session.on('change', () => { 
                    const val = ed1.getValue();
                    if (sourceCode !== val) sourceCode = val; 
                });
                $watch(() => currentForkCode, (code) => {
                    if (ed1.getValue() !== code) {
                        ed1.setValue(code || docSource || '', -1);
                    }
                    ed1.setReadOnly(activeFork === 'Default');
                });
                setTimeout(() => ed1.resize(), 100);
            }

            // Snippet Editor Init
            if (props.doc?.Snippet && !window._snippetEditor) {
                const ed2 = ace.edit('snippet-editor');
                window._snippetEditor = ed2;
                ed2.setTheme('ace/theme/tomorrow_night_eighties');
                ed2.session.setMode('ace/mode/html');
                ed2.setValue(props.doc.Snippet || '', -1);
                ed2.setReadOnly(true);
                ed2.session.on('change', () => { 
                    const val = ed2.getValue();
                    if (snippetCode !== val) snippetCode = val; 
                });
                $watch(() => currentSnippetCode, (code) => {
                    if (ed2.getValue() !== code) {
                        ed2.setValue(code || props.doc.Snippet || '', -1);
                    }
                    ed2.setReadOnly(activeSnippet === 'Default');
                });
                setTimeout(() => ed2.resize(), 100);
            }
        }
    ">

    <div class="max-w-5xl mx-auto space-y-12" data-if="props.doc">

        <!-- ═══════════ 1. TITLE ═══════════ -->
        <div class="mb-12">
            <h1 class="text-4xl font-bold mb-4 flex items-center gap-3 text-primary">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-10 h-10"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 3v1.5M4.5 8.25H3m18 0h-1.5M4.5 12H3m18 0h-1.5m-15 3.75H3m18 0h-1.5M8.25 19.5V21M12 3v1.5m0 15V21m3.75-18v1.5m0 15V21m-9-1.5h10.5a2.25 2.25 0 002.25-2.25V6.75a2.25 2.25 0 00-2.25-2.25H6.75A2.25 2.25 0 004.5 6.75v10.5a2.25 2.25 0 002.25 2.25zm.75-12h9v9h-9v-9z" /></svg>
                <span data-text="props.doc.Title"></span>
            </h1>
            <p class="text-xl opacity-80 max-w-3xl leading-relaxed" data-html="props.doc.Description"></p>
        </div>

        <!-- ═══════════ 2. SYNTAX & SOURCE ═══════════ -->
        <div class="card bg-base-100 shadow-xl border border-base-300 mb-12">

            <div class="card-body pb-0">
                <div class="flex flex-col md:flex-row justify-between md:items-center border-b border-base-300 pb-4 mb-4 gap-4">
                    <h2 class="card-title text-secondary">Syntax &amp; Framework Source</h2>
                    <div class="tabs tabs-boxed bg-base-200">
                        <a class="tab" data-class-tab-active="syntaxTab === 'usage'" data-on-click="syntaxTab = 'usage'">Usage</a>
                        <a class="tab" data-class-tab-active="syntaxTab === 'source'" data-on-click="syntaxTab = 'source'; setTimeout(() => ace.edit('source-editor').resize(), 50)">Source</a>
                    </div>
                </div>
                <div data-show="syntaxTab === 'usage'" class="pb-4">
                    <pre class="mockup-code bg-neutral text-neutral-content p-4 font-mono text-sm w-full overflow-x-auto"><code data-text="props.doc.Syntax"></code></pre>
                </div>
                <div data-show="syntaxTab === 'source'" style="display:none;">
                    <div class="nx-editor-container border border-neutral/50 rounded-xl overflow-hidden mb-6" style="position: relative; min-height: 400px; width: 100%;">
                        <div id="source-editor" class="nx-editor" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 14px;"></div>
                    </div>
                </div>
            </div>

            <!-- Syntax Codebar -->
            <div class="nx-cmdbar flex items-center justify-between px-6 py-3 bg-base-200/50 border-t border-base-300" style="border-radius: 0 0 calc(var(--rounded-box, 1rem)) calc(var(--rounded-box, 1rem));">
                <!-- Left: Selector -->
                <div class="flex items-center gap-2">
                    <select class="select select-bordered select-sm w-48 bg-base-100/50"
                            data-model="activeFork">
                        <option value="Default">Default</option>
                        <template data-for="f in forksFiltered">
                            <option data-attr-value="f" data-text="f"></option>
                        </template>
                    </select>
                    <button class="btn btn-sm btn-secondary btn-outline" title="New fork"
                            data-on-click="showForkModal = true; forkName = ''; forkError = ''">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
                    </button>
                </div>

                <!-- Center: Download + Copy (Restored) -->
                <div class="join">
                    <button class="btn btn-sm btn-ghost join-item border border-base-300 gap-1.5" 
                            title="Download current code"
                            data-on-click="
                                const blob = new Blob([activeFork === 'Default' ? docSource : _indexedDB.forks[props.doc.SourceModule + '_' + activeFork]], { type: 'text/plain' });
                                const url = URL.createObjectURL(blob);
                                const a = document.createElement('a');
                                a.href = url;
                                a.download = 'framework-' + activeFork.toLowerCase() + '.ts';
                                a.click();
                            ">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
                    </button>
                    <button class="btn btn-sm btn-ghost join-item border border-base-300 gap-1.5" 
                            title="Copy to clipboard"
                            data-on-click="
                                $clipboard.write(activeFork === 'Default' ? docSource : _indexedDB.forks[props.doc.SourceModule + '_' + activeFork]);
                                toastMsg = 'Source copied to clipboard'; toastType = 'info'; showToast = true;
                            ">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75" /></svg>
                    </button>
                </div>

                <!-- Right: Save + Reset -->
                <div class="flex items-center gap-2">
                    <button class="btn btn-sm btn-primary btn-outline gap-1"
                            data-bind="{ disabled: activeFork === 'Default' }"
                            data-class-btn-disabled="activeFork === 'Default'"
                            data-on-click="
                                if (activeFork !== 'Default') {
                                    const anns = ace.edit('source-editor').session.getAnnotations();
                                    if (anns.some(a => a.type === 'error')) { toastMsg = 'Fix errors before saving'; toastType = 'warning'; showToast = true; return; }
                                    toastMsg = 'Fork saved: ' + activeFork; toastType = 'success'; showToast = true;
                                    _indexedDB.forks[props.doc.SourceModule + '_' + activeFork] = sourceCode;
                                }
                            ">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg> Save
                    </button>
                    <button class="btn btn-sm btn-warning btn-outline"
                            data-bind="{ disabled: activeFork === 'Default' }"
                            data-class-btn-disabled="activeFork === 'Default'"
                            data-on-click="
                                if (activeFork !== 'Default') {
                                    toastMsg = 'Resetting...'; toastType = 'info'; showToast = true;
                                    ace.edit('source-editor').setValue(_indexedDB.forks[props.doc.SourceModule + '_' + activeFork] || docSource || '', -1);
                                }
                            ">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182" /></svg> Reset
                    </button>
                </div>
            </div>

            <!-- Fork Modal -->
            <div data-show="showForkModal" class="fixed inset-0 bg-black/50 z-[9998] flex items-center justify-center" style="display:none;">
                <div class="card bg-base-100 shadow-2xl border border-base-300 max-w-md w-full mx-4">
                    <div class="card-body">
                        <h3 class="card-title text-secondary">Create Fork</h3>
                        <p class="py-2 opacity-70">Fork the framework source under a new name:</p>
                        <input type="text" class="input input-bordered input-secondary w-full" data-model="forkName" placeholder="my-feature-branch">
                        <p data-show="forkError !== ''" class="text-error text-sm mt-1" data-text="forkError" style="display:none;"></p>
                        <div class="card-actions justify-end mt-4">
                            <button class="btn btn-ghost" data-on-click="showForkModal = false">Cancel</button>
                            <button class="btn btn-secondary" data-on-click="
                                const name = forkName.trim();
                                if (!name) { forkError = 'Name is required'; return; }
                                if (name === 'Default') { forkError = 'Reserved name'; return; }
                                if (forksFiltered.indexOf(name) !== -1) { forkError = 'Already exists'; return; }
                                activeFork = name;
                                _indexedDB.forks[props.doc.SourceModule + '_' + name] = sourceCode;
                                showForkModal = false;
                                toastMsg = 'Fork created: ' + name; toastType = 'success'; showToast = true;
                                setTimeout(() => ace.edit('source-editor').focus(), 100);
                            ">Create</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ═══════════ 3. INTERACTIVE DEMO ═══════════ -->
        <div class="card bg-base-100 shadow-xl border border-base-300 mb-8">

            <div class="card-body pb-0">
                <div class="flex flex-col md:flex-row justify-between md:items-center border-b border-base-300 pb-4 mb-4 gap-4">
                    <h2 class="card-title text-secondary">Interactive Demonstration</h2>
                    <div class="tabs tabs-boxed bg-base-200">
                        <a class="tab" data-class-tab-active="demoTab === 'preview'" data-on-click="demoTab = 'preview'">Preview</a>
                        <a class="tab" data-class-tab-active="demoTab === 'code'" data-on-click="demoTab = 'code'; setTimeout(() => ace.edit('snippet-editor').resize(), 50)">Code</a>
                    </div>
                </div>

                <!-- Preview — dynamically renders snippetCode via data-html -->
                <div data-show="demoTab === 'preview'" class="pb-6">
                    <div class="bg-base-300/30 rounded-lg p-6 min-h-[140px] border border-dashed border-base-300"
                         data-show="demoTab === 'preview'"
                         data-html="snippetCode">
                    </div>
                </div>

                <!-- Snippet Editor -->
                <div data-show="demoTab === 'code'" style="display:none;">
                    <div class="nx-editor-container border border-neutral/50 rounded-xl overflow-hidden mb-6" style="position: relative; min-height: 400px; width: 100%;">
                        <div id="snippet-editor" class="nx-editor" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 14px;"></div>
                    </div>
                </div>
            </div>

            <!-- Demo Codebar -->
            <div class="nx-cmdbar flex items-center justify-between px-6 py-3 bg-base-200/50 border-t border-base-300" style="border-radius: 0 0 calc(var(--rounded-box, 1rem)) calc(var(--rounded-box, 1rem));">
                <!-- Left: Selector -->
                <div class="flex items-center gap-2">
                    <select class="select select-bordered select-sm w-48 bg-base-100/50"
                            data-model="activeSnippet">
                        <option value="Default">Default</option>
                        <template data-for="s in snippetsFiltered">
                            <option data-attr-value="s" data-text="s"></option>
                        </template>
                    </select>
                    <button class="btn btn-sm btn-secondary btn-outline" title="New snippet"
                            data-on-click="showSnippetModal = true; snippetName = ''; snippetError = ''">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
                    </button>
                </div>

                <!-- Center: Download + Copy (Restored) -->
                <div class="join">
                    <button class="btn btn-sm btn-ghost join-item border border-base-300 gap-1.5" 
                            title="Download current snippet"
                            data-on-click="
                                const blob = new Blob([activeSnippet === 'Default' ? props.doc.Snippet : _indexedDB.snippets[props.doc.SnippetModule + '_' + activeSnippet]], { type: 'text/html' });
                                const url = URL.createObjectURL(blob);
                                const a = document.createElement('a');
                                a.href = url;
                                a.download = 'snippet-' + activeSnippet.toLowerCase() + '.html';
                                a.click();
                            ">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
                    </button>
                    <button class="btn btn-sm btn-ghost join-item border border-base-300 gap-1.5" 
                            title="Copy to clipboard"
                            data-on-click="
                                $clipboard.write(activeSnippet === 'Default' ? props.doc.Snippet : _indexedDB.snippets[props.doc.SnippetModule + '_' + activeSnippet]);
                                toastMsg = 'Snippet copied to clipboard'; toastType = 'info'; showToast = true;
                            ">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75" /></svg>
                    </button>
                </div>

                <!-- Right: Save + Reset -->
                <div class="flex items-center gap-2">
                    <button class="btn btn-sm btn-primary btn-outline gap-1"
                            data-bind="{ disabled: activeSnippet === 'Default' }"
                            data-class-btn-disabled="activeSnippet === 'Default'"
                            data-on-click="
                                if (activeSnippet !== 'Default') {
                                    toastMsg = 'Snippet saved: ' + activeSnippet; toastType = 'success'; showToast = true;
                                    _indexedDB.snippets[props.doc.SnippetModule + '_' + activeSnippet] = snippetCode;
                                }
                            ">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg> Save
                    </button>
                    <button class="btn btn-sm btn-warning btn-outline"
                            data-bind="{ disabled: activeSnippet === 'Default' }"
                            data-class-btn-disabled="activeSnippet === 'Default'"
                            data-on-click="
                                if (activeSnippet !== 'Default') {
                                    toastMsg = 'Resetting...'; toastType = 'info'; showToast = true;
                                    ace.edit('snippet-editor').setValue(_indexedDB.snippets[props.doc.SnippetModule + '_' + activeSnippet] || props.doc.Snippet || '', -1);
                                }
                            ">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182" /></svg> Reset
                    </button>
                </div>
            </div>

            <!-- Snippet Modal -->
            <div data-show="showSnippetModal" class="fixed inset-0 bg-black/50 z-[9998] flex items-center justify-center" style="display:none;">
                <div class="card bg-base-100 shadow-2xl border border-base-300 max-w-md w-full mx-4">
                    <div class="card-body">
                        <h3 class="card-title text-secondary">Save Snippet</h3>
                        <p class="py-2 opacity-70">Save this demo template under a name:</p>
                        <input type="text" class="input input-bordered input-secondary w-full" data-model="snippetName" placeholder="nested-signals-test">
                        <p data-show="snippetError !== ''" class="text-error text-sm mt-1" data-text="snippetError" style="display:none;"></p>
                        <div class="card-actions justify-end mt-4">
                            <button class="btn btn-ghost" data-on-click="showSnippetModal = false">Cancel</button>
                            <button class="btn btn-secondary" data-on-click="
                                const name = snippetName.trim();
                                if (!name) { snippetError = 'Name is required'; return; }
                                if (name === 'Default') { snippetError = 'Reserved name'; return; }
                                if (snippetsFiltered.indexOf(name) !== -1) { snippetError = 'Already exists'; return; }
                                activeSnippet = name;
                                _indexedDB.snippets[props.doc.SnippetModule + '_' + name] = snippetCode;
                                showSnippetModal = false;
                                toastMsg = 'Snippet saved: ' + name; toastType = 'success'; showToast = true;
                            ">Save</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ═══════════ 4. EXTENSIBILITY ═══════════ -->
        <div class="card bg-base-100 shadow-xl border border-base-300">
            <div class="card-body">
                <h2 class="card-title text-secondary border-b border-base-300 pb-2 flex gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.877-5.827M15.75 15.75L21 21m-5.25-5.25l-1.5-1.5m3-3l1.5-1.5m-3 3L11.42 15.17M11.42 15.17A4.475 4.475 0 0012 11.25c0-2.485-2.015-4.5-4.5-4.5s-4.5 2.015-4.5 4.5c0 2.485 2.015 4.5 4.5 4.5 1.574 0 3.012-.81 3.82-2.08m0 0L3.75 3.75" /></svg>
                    Extensibility Notes
                </h2>
                <div class="opacity-80 leading-relaxed" data-html="props.doc.Extensibility"></div>
            </div>
        </div>

        <!-- Toast -->
        <div data-show="showToast" class="fixed bottom-6 right-6 z-[9999] shadow-2xl" style="display:none;"
             data-effect="if (showToast) setTimeout(() => showToast = false, 3000)">
            <div class="alert shadow-lg" data-class-alert-success="toastType === 'success'" data-class-alert-info="toastType === 'info'" data-class-alert-warning="toastType === 'warning'">
                <span data-text="toastMsg" class="font-bold"></span>
            </div>
        </div>
    </div>
</div>
</template>
