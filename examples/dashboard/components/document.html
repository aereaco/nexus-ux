<template data-name="document">
    <div class="dashboard-fragment" data-signal="{ 
        toastMsg: '', 
        toastType: 'info', 
        showToast: false,
        syntaxTab: 'usage',
        demoTab: 'preview',
        activeFork: 'Default',
        activeSnippet: 'Default',
        showForkModal: false,
        showSnippetModal: false,
        forkName: '',
        snippetName: '',
        forkError: '',
        snippetError: '',
        engine: 15,
        forkSource: '',
        forkCode: '',
        snippetCode: '',
        forks: [],
        snippets: [],
        forksLoaded: false,
        snippetsLoaded: false,
        manageTarget: '',
        newName: '',
        showRenameForkModal: false,
        showDeleteForkModal: false,
        showRenameSnippetModal: false,
        showDeleteSnippetModal: false,
        manageError: ''
     }" data-computed="{
         currentForkCode: () => (activeFork === 'Default' || !doc) ? (forkSource || '') : _indexedDB?.forks?.[doc.SourceModule + '_' + activeFork],
         currentSnippetCode: () => (activeSnippet === 'Default' || !doc) ? (doc?.Snippet || '') : _indexedDB?.snippets?.[doc.SnippetModule + '_' + activeSnippet]
     }" data-effect="
        if (doc) {
            // Immediate sync to avoid waiting for Ace to populate the preview
            if (!snippetCode && doc.Snippet) snippetCode = doc.Snippet;
            if (activeFork === 'Default' && forkSource && !forkCode) forkCode = forkSource;

            if (!forkSource && doc.SourceModule) {
                $get('/src' + doc.SourceModule, { responseType: 'text' }).then(d => {
                    forkSource = d;
                    if (activeFork === 'Default') forkCode = d;
                });
            }

            // Initialize lists from mirrors explicitly (avoiding async computed flicker)
            if (_indexedDB?.forks && !forksLoaded) {
                forksLoaded = true;
                if (window._nexusDebug) console.log(`[document] Listing forks for prefix: ${doc.SourceModule}_`);
                _indexedDB.forks.list(doc.SourceModule + '_').then(keys => {
                    if (window._nexusDebug) console.log(`[document] Found fork keys:`, keys);
                    forks = keys.map(k => k.substring(doc.SourceModule.length + 1));
                });
            }
            if (_indexedDB?.snippets && !snippetsLoaded) {
                snippetsLoaded = true;
                if (window._nexusDebug) console.log(`[document] Listing snippets for prefix: ${doc.SnippetModule}_`);
                _indexedDB.snippets.list(doc.SnippetModule + '_').then(keys => {
                    if (window._nexusDebug) console.log(`[document] Found snippet keys:`, keys);
                    snippets = keys.map(k => k.substring(doc.SnippetModule.length + 1));
                });
            }
        }

        if (window.ace) {
            ace.config.set('basePath', 'https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/');
            
            // Source Editor Init
            if (forkSource && !window._sourceEditor) {
                const ed1 = ace.edit('source-editor');
                window._sourceEditor = ed1;
                ed1.setTheme('ace/theme/tomorrow_night_eighties');
                ed1.session.setMode('ace/mode/typescript');
                ed1.session.on('change', () => { 
                    const val = ed1.getValue();
                    if (forkCode !== val) forkCode = val; 
                });
                ed1.setValue(forkSource || '', -1);
                ed1.setReadOnly(true);
                $watch(() => currentForkCode, (code) => {
                    if (code !== undefined && ed1.getValue() !== code) {
                        ed1.setValue(code || forkSource || '', -1);
                    }
                });
                $watch(() => activeFork, (fork) => {
                    ed1.setReadOnly(fork === 'Default');
                });
                setTimeout(() => ed1.resize(), 100);
            }

            // Snippet Editor Init
            if (doc?.Snippet && !window._snippetEditor) {
                const ed2 = ace.edit('snippet-editor');
                window._snippetEditor = ed2;
                ed2.setTheme('ace/theme/tomorrow_night_eighties');
                ed2.session.setMode('ace/mode/html');
                ed2.session.on('change', () => { 
                    const val = ed2.getValue();
                    if (snippetCode !== val) snippetCode = val; 
                });
                ed2.setValue(doc.Snippet || '', -1);
                ed2.setReadOnly(true);
                $watch(() => currentSnippetCode, (code) => {
                    if (code !== undefined && ed2.getValue() !== code) {
                        ed2.setValue(code || doc?.Snippet || '', -1);
                    }
                });
                $watch(() => activeSnippet, (snip) => {
                    ed2.setReadOnly(snip === 'Default');
                });
                setTimeout(() => ed2.resize(), 100);
            }
        }
    ">

        <div class="max-w-5xl mx-auto space-y-12" data-if="doc">

            <!-- ═══════════ 1. TITLE & DESCRIPTION ═══════════ -->
            <div class="mb-12">
                <h1 class="text-4xl font-bold mb-4 flex items-center gap-3 text-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="w-10 h-10">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M8.25 3v1.5M4.5 8.25H3m18 0h-1.5M4.5 12H3m18 0h-1.5m-15 3.75H3m18 0h-1.5M8.25 19.5V21M12 3v1.5m0 15V21m3.75-18v1.5m0 15V21m-9-1.5h10.5a2.25 2.25 0 002.25-2.25V6.75a2.25 2.25 0 00-2.25-2.25H6.75A2.25 2.25 0 004.5 6.75v10.5a2.25 2.25 0 002.25 2.25zm.75-12h9v9h-9v-9z" />
                    </svg>
                    <span data-text="doc.Title"></span>
                </h1>
                <p class="text-xl opacity-80 max-w-3xl leading-relaxed" data-html="doc.Description"></p>
            </div>

            <!-- ═══════════ 2. SYNTAX & SOURCE ═══════════ -->
            <div class="card bg-base-100 shadow-xl border border-base-300 mb-12">

                <div class="card-body pb-0">
                    <div
                        class="flex flex-col md:flex-row justify-between md:items-center border-b border-base-300 pb-4 mb-4 gap-4">
                        <h2 class="card-title text-secondary">Syntax &amp; Framework Source</h2>
                        <div class="tabs tabs-boxed bg-base-200">
                            <a class="tab" data-class-tab-active="syntaxTab === 'usage'"
                                data-on-click="syntaxTab = 'usage'">Usage</a>
                            <a class="tab" data-class-tab-active="syntaxTab === 'source'"
                                data-on-click="syntaxTab = 'source'; setTimeout(() => ace.edit('source-editor').resize(), 50)">Source</a>
                        </div>
                    </div>
                    <div data-show="syntaxTab === 'usage'" class="pb-4">
                        <pre
                            class="mockup-code bg-neutral text-neutral-content p-4 font-mono text-sm w-full overflow-x-auto"><code data-text="doc.Syntax || ''"></code></pre>
                    </div>
                    <div data-show="syntaxTab === 'source'" style="display:none;">
                        <div class="nx-editor-container border border-neutral/50 rounded-xl overflow-hidden mb-6"
                            style="position: relative; min-height: 400px; width: 100%;">
                            <div id="source-editor" class="nx-editor"
                                style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 14px;">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Syntax Codebar -->
                <div class="nx-cmdbar flex items-center justify-between px-6 py-3 bg-base-200/50 border-t border-base-300"
                    style="border-radius: 0 0 calc(var(--rounded-box, 1rem)) calc(var(--rounded-box, 1rem));">
                    <!-- Left: Selector -->
                    <div class="flex items-center gap-2">
                        <div class="dropdown dropdown-bottom">
                            <div tabindex="0" role="button"
                                class="btn btn-bordered btn-sm w-48 justify-between bg-base-100/50 font-bold overflow-hidden">
                                <span data-text="activeFork" class="truncate mr-2"></span>
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                                    stroke="currentColor" class="w-4 h-4 opacity-50">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                                </svg>
                            </div>
                            <ul tabindex="0"
                                class="dropdown-content z-[100] menu p-2 shadow-2xl bg-base-100 rounded-box w-56 border border-base-300 mt-1">
                                <li><a data-on-click="activeFork = 'Default'"
                                        data-class-active="activeFork === 'Default'" class="font-bold">Default</a></li>
                                <div class="divider my-0 opacity-20"></div>
                                <template data-for="f in forks">
                                    <li class="group flex flex-row items-center justify-between">
                                        <a data-on-click="activeFork = f" data-class-active="activeFork === f"
                                            class="flex-1 flex items-center justify-between">
                                            <div data-text="f" class="truncate"></div>
                                            <div
                                                class="flex gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity pr-2">
                                                <button class="btn btn-ghost btn-xs text-info p-1 h-auto min-h-0"
                                                    data-on-click="$evt.stopPropagation(); manageTarget = f; newName = f; void _indexedDB.forks[doc.SourceModule + '_' + f]; showRenameForkModal = true"
                                                    title="Rename">
                                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                                                        viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
                                                        class="w-3.5 h-3.5">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
                                                    </svg>
                                                </button>
                                                <button class="btn btn-ghost btn-xs text-error p-1 h-auto min-h-0"
                                                    data-on-click="$evt.stopPropagation(); manageTarget = f; showDeleteForkModal = true"
                                                    title="Delete">
                                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                                                        viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
                                                        class="w-3.5 h-3.5">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            d="M14.74 9l-.34 9m-4.72 0L9.36 9m11.17-6.23a4.5 4.5 0 01-1.24.58L18 3.32V3h-3.41l-.14-.49A2.25 2.25 0 0012.31 1h-0.62a2.25 2.25 0 00-2.14 1.51l-.14.49H6v.32l-2.12.09a4.5 4.5 0 00-1.24-.58L1 3.77l.79 2.14 1.16-.05V18.75A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V5.86l1.16.05.79-2.14-0.21-.09z" />
                                                    </svg>
                                                </button>
                                            </div>
                                        </a>
                                    </li>
                                </template>
                            </ul>
                        </div>
                        <button class="btn btn-sm btn-secondary btn-outline" title="New fork"
                            data-on-click="showForkModal = true; forkName = ''; forkError = ''">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                                stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                            </svg>
                        </button>
                        <span class="badge badge-primary text-[10px] opacity-30" data-show="forks.length > 0"
                            data-text="forks.length"></span>
                    </div>

                    <!-- Center: Download + Copy (Restored) -->
                    <div class="join">
                        <button class="btn btn-sm btn-ghost join-item border border-base-300 gap-1.5"
                            title="Download current code" data-on-click="
                                const blob = new Blob([activeFork === 'Default' ? forkSource : _indexedDB.forks[doc.SourceModule + '_' + activeFork]], { type: 'text/plain' });
                                const url = URL.createObjectURL(blob);
                                const a = document.createElement('a');
                                a.href = url;
                                const moduleName = doc.SourceModule.split('/').pop().split('.')[0];
                                a.download = moduleName + '_' + activeFork.toLowerCase() + '.ts';
                                a.click();
                            ">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                                stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
                            </svg>
                        </button>
                        <button class="btn btn-sm btn-ghost join-item border border-base-300 gap-1.5"
                            title="Copy to clipboard" data-on-click="
                                navigator.clipboard.writeText(forkCode).catch(e => console.error('Copy failed', e));
                                toastMsg = 'The ' + activeFork + ' fork copied to clipboard'; toastType = 'info'; showToast = true;
                            ">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                                stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75" />
                            </svg>
                        </button>
                    </div>

                    <!-- Right: Save + Reset -->
                    <div class="flex items-center gap-2">
                        <button
                            class="btn btn-sm btn-ghost gap-2 text-secondary border-secondary/20 hover:bg-secondary/10"
                            data-bind="{ disabled: activeFork === 'Default' }"
                            data-class-btn-disabled="activeFork === 'Default'" data-on-click="
                                if (activeFork !== 'Default') {
                                    const anns = ace.edit('source-editor').session.getAnnotations();
                                    if (anns.some(a => a.type === 'error')) { toastMsg = 'Fix errors before saving'; toastType = 'warning'; showToast = true; return; }
                                    _indexedDB.forks[doc.SourceModule + '_' + activeFork] = forkCode;
                                    toastMsg = 'Fork saved: ' + activeFork; toastType = 'success'; showToast = true;
                                }
                            ">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                                stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
                            </svg> Save
                        </button>
                        <button class="btn btn-sm btn-ghost gap-2 text-error border-error/20 hover:bg-error/10"
                            data-bind="{ disabled: activeFork === 'Default' }"
                            data-class-btn-disabled="activeFork === 'Default'" data-on-click="
                                if (activeFork !== 'Default') {
                                    const resetVal = _indexedDB.forks[doc.SourceModule + '_' + activeFork];
                                    if (resetVal !== undefined) window._sourceEditor.setValue(resetVal || forkSource || '', -1);
                                    toastMsg = 'Resetting...'; toastType = 'info'; showToast = true;
                                }
                            ">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                                stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182" />
                            </svg> Reset
                        </button>
                    </div>
                </div>

                <!-- Fork Modal -->
                <div data-show="showForkModal"
                    class="fixed inset-0 bg-black/50 z-[9998] flex items-center justify-center" style="display:none;">
                    <div class="card bg-base-100 shadow-2xl border border-base-300 max-w-md w-full mx-4">
                        <div class="card-body">
                            <h3 class="card-title text-secondary">Create Fork</h3>
                            <p class="py-2 opacity-70">Fork the framework source under a new name:</p>
                            <input type="text" class="input input-bordered input-secondary w-full" data-model="forkName"
                                placeholder="my-feature-branch">
                            <p data-show="forkError !== ''" class="text-error text-sm mt-1" data-text="forkError"
                                style="display:none;"></p>
                            <div class="card-actions justify-end mt-4">
                                <button class="btn btn-ghost" data-on-click="showForkModal = false">Cancel</button>
                                <button class="btn btn-secondary" data-on-click="
                                const name = forkName.trim();
                                if (!name) { forkError = 'Name is required'; return; }
                                if (name === 'Default') { forkError = 'Reserved name'; return; }
                                if (forks.indexOf(name) !== -1) { forkError = 'Already exists'; return; }
                                _indexedDB.forks[doc.SourceModule + '_' + name] = forkCode;
                                forks.push(name);
                                activeFork = name;
                                showForkModal = false;
                                toastMsg = 'Fork created: ' + name; toastType = 'success'; showToast = true;
                                setTimeout(() => ace.edit('source-editor').focus(), 100);
                            ">Create</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ═══════════ 3. INTERACTIVE DEMO ═══════════ -->
            <div class="card bg-base-100 shadow-xl border border-base-300 mb-8">

                <div class="card-body pb-0">
                    <div
                        class="flex flex-col md:flex-row justify-between md:items-center border-b border-base-300 pb-4 mb-4 gap-4">
                        <h2 class="card-title text-secondary">Interactive Demonstration</h2>
                        <div class="tabs tabs-boxed bg-base-200">
                            <a class="tab" data-class-tab-active="demoTab === 'preview'"
                                data-on-click="demoTab = 'preview'">Preview</a>
                            <a class="tab" data-class-tab-active="demoTab === 'code'"
                                data-on-click="demoTab = 'code'; setTimeout(() => ace.edit('snippet-editor').resize(), 50)">Code</a>
                        </div>
                    </div>

                    <!-- Preview — dynamically renders snippetCode via data-html -->
                    <div data-show="demoTab === 'preview'" class="pb-6">
                        <div class="bg-base-300/30 rounded-lg p-6 min-h-[140px] border border-dashed border-base-300"
                            data-html="snippetCode">
                        </div>
                    </div>

                    <!-- Snippet Editor -->
                    <div data-show="demoTab === 'code'" style="display:none;">
                        <div class="nx-editor-container border border-neutral/50 rounded-xl overflow-hidden mb-6"
                            style="position: relative; min-height: 400px; width: 100%;">
                            <div id="snippet-editor" class="nx-editor"
                                style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 14px;">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Demo Codebar -->
                <div class="nx-cmdbar flex items-center justify-between px-6 py-3 bg-base-200/50 border-t border-base-300"
                    style="border-radius: 0 0 calc(var(--rounded-box, 1rem)) calc(var(--rounded-box, 1rem));">
                    <!-- Left: Selector -->
                    <div class="flex items-center gap-2">
                        <div class="dropdown dropdown-bottom">
                            <div tabindex="0" role="button"
                                class="btn btn-bordered btn-sm w-48 justify-between bg-base-100/50 font-bold overflow-hidden">
                                <span data-text="activeSnippet" class="truncate mr-2"></span>
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                                    stroke="currentColor" class="w-4 h-4 opacity-50">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                                </svg>
                            </div>
                            <ul tabindex="0"
                                class="dropdown-content z-[100] menu p-2 shadow-2xl bg-base-100 rounded-box w-56 border border-base-300 mt-1">
                                <li><a data-on-click="activeSnippet = 'Default'"
                                        data-class-active="activeSnippet === 'Default'" class="font-bold">Default</a>
                                </li>
                                <div class="divider my-0 opacity-20"></div>
                                <template data-for="s in snippets">
                                    <li class="group flex flex-row items-center justify-between">
                                        <a data-on-click="activeSnippet = s" data-class-active="activeSnippet === s"
                                            class="flex-1 flex items-center justify-between">
                                            <div data-text="s" class="truncate"></div>
                                            <div
                                                class="flex gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity pr-2">
                                                <button class="btn btn-ghost btn-xs text-info p-1 h-auto min-h-0"
                                                    data-on-click="$evt.stopPropagation(); manageTarget = s; newName = s; void _indexedDB.snippets[doc.SnippetModule + '_' + s]; showRenameSnippetModal = true"
                                                    title="Rename">
                                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                                                        viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
                                                        class="w-3.5 h-3.5">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
                                                    </svg>
                                                </button>
                                                <button class="btn btn-ghost btn-xs text-error p-1 h-auto min-h-0"
                                                    data-on-click="$evt.stopPropagation(); manageTarget = s; showDeleteSnippetModal = true"
                                                    title="Delete">
                                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none"
                                                        viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
                                                        class="w-3.5 h-3.5">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            d="M14.74 9l-.34 9m-4.72 0L9.36 9m11.17-6.23a4.5 4.5 0 01-1.24.58L18 3.32V3h-3.41l-.14-.49A2.25 2.25 0 0012.31 1h-0.62a2.25 2.25 0 00-2.14 1.51l-.14.49H6v.32l-2.12.09a4.5 4.5 0 00-1.24-.58L1 3.77l.79 2.14 1.16-.05V18.75A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V5.86l1.16.05.79-2.14-0.21-.09z" />
                                                    </svg>
                                                </button>
                                            </div>
                                        </a>
                                    </li>
                                </template>
