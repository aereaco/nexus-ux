<!DOCTYPE html>
<html lang="en" data-ux-init data-debug
      data-injest="{
          daisy: { link: 'https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css' },
          tailwind: { script: 'https://cdn.tailwindcss.com' },
      }"
      data-signal="{
          doc: {
            Title: 'data-component',
            Description: 'This page demonstrates the &lt;code&gt;data-component&lt;/code&gt; attribute—the revolutionary lazy-loading template injesting engine powering this entire dashboard.',
            Syntax: '&lt;div data-component=\&quot;/path/to/component.html\&quot;&gt;&lt;/div&gt;',
            SourceModule: '/modules/attributes/component.ts',
            SnippetModule: '/examples/dashboard/pages/attributes/component.html',
            Extensibility: '&lt;p class=\&quot;opacity-80 mt-4 leading-relaxed\&quot;&gt;The &lt;code&gt;src/modules/attributes/component.ts&lt;/code&gt; loader mounts dynamically. Integrating a global HTTP cache interceptor significantly reduces template repaints in large layouts.&lt;/p&gt;',
            Snippet: '&lt;div class=\&quot;p-8 bg-base-200 rounded-box border shadow-inner\&quot;&gt;\n    &lt;div class=\&quot;flex gap-4 mb-8\&quot;&gt;\n        &lt;button class=\&quot;btn btn-outline btn-primary shadow-sm\&quot; data-on-click=\&quot;activeFragment = \'test_component_card.html\'\&quot;&gt;Load Component A&lt;/button&gt;\n        &lt;button class=\&quot;btn btn-outline btn-secondary shadow-sm\&quot; data-on-click=\&quot;activeFragment = \'test_component_alert.html\'\&quot;&gt;Load Component B&lt;/button&gt;\n        &lt;button class=\&quot;btn btn-error shadow-sm\&quot; data-on-click=\&quot;activeFragment = \'none\'\&quot;&gt;Destroy Component Tree&lt;/button&gt;\n    &lt;/div&gt;\n    \n    &lt;div class=\&quot;divider\&quot;&gt;Ingested Component DOM Mount Point&lt;/div&gt;\n    \n    &lt;div data-show=\&quot;activeFragment === \'none\'\&quot; class=\&quot;h-32 flex items-center justify-center border-2 border-dashed border-base-300 rounded-xl text-base-content/50 font-medium bg-base-100\&quot;&gt;\n        No component mounted. Awaiting fetch request...\n    &lt;/div&gt;\n    \n    &lt;div data-show=\&quot;activeFragment !== \'none\'\&quot;&gt;\n        &lt;!-- The actual component router fetching literal HTML files! --&gt;\n        &lt;div data-component=\&quot;activeFragment\&quot; style=\&quot;min-height: 128px;\&quot; class=\&quot;border-2 border-primary rounded-xl overflow-hidden shadow-lg transition-all duration-300 bg-base-100\&quot;&gt;&lt;/div&gt;\n    &lt;/div&gt;\n\n    &lt;!-- Hidden template files mapping for this demonstration since we don\'t have secondary files --&gt;\n    &lt;template id=\&quot;test_component_card.html\&quot;&gt;\n        &lt;div class=\&quot;p-6 bg-primary text-primary-content\&quot;&gt;\n            &lt;h2 class=\&quot;text-2xl font-bold mb-2\&quot;&gt;Component A Loaded!&lt;/h2&gt;\n            &lt;p&gt;I am an HTML fragment successfully fetched, extracted via RegExp, and mapped cleanly into the global AST scope.&lt;/p&gt;\n        &lt;/div&gt;\n    &lt;/template&gt;\n    \n    &lt;template id=\&quot;test_component_alert.html\&quot;&gt;\n         &lt;div class=\&quot;p-6 bg-secondary text-secondary-content\&quot;&gt;\n            &lt;h2 class=\&quot;text-2xl font-bold mb-2\&quot;&gt;Component B Loaded!&lt;/h2&gt;\n            &lt;p&gt;This demonstrates completely modular micro-frontend construction directly inside purely declarative HTML files.&lt;/p&gt;\n        &lt;/div&gt;\n    &lt;/template&gt;\n\n    &lt;script&gt;\n        // Very quick API mockup to hijack fetch to use the templates above for demo\n        if (!window.__fetch_hijacked) {\n            window.__fetch_hijacked = true;\n            const originalFetch = window.fetch;\n            window.fetch = async (url, options) =&gt; {\n                if (typeof url === \'string\' && url.includes(\'test_component_card.html\')) {\n                    const tpl = document.getElementById(\'test_component_card.html\');\n                    return new Response(tpl.innerHTML, { headers: { \'content-type\': \'text/html\' }});\n                } else if (typeof url === \'string\' && url.includes(\'test_component_alert.html\')) {\n                    const tpl = document.getElementById(\'test_component_alert.html\');\n                    return new Response(tpl.innerHTML, { headers: { \'content-type\': \'text/html\' }});\n                }\n                return originalFetch(url, options);\n            };\n        }\n    &lt;/script&gt;\n&lt;/div&gt;'
          },
          appReady: false,
          activeFragment: 'none'
      }">
<head>
    <meta charset="UTF-8">
    <title>Nexus-UX | data-component</title>
    <script type="module" src="../../../../dist/nexus-ux.js"></script>
    <style>
        progress { appearance: none; -webkit-appearance: none; border: none; background: transparent; height: 0.5rem; margin: 0; display: block; }
        progress::-webkit-progress-bar { background-color: rgba(166, 173, 187, 0.2); }
        progress::-webkit-progress-value { background-color: #570df8; }
        progress::-moz-progress-bar { background-color: #570df8; }
        main { opacity: 0; transition: opacity 0.5s ease-in; }
        .nexus-ready main { opacity: 1; }
        .nexus-progress-mount { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; }
        .nx-editor-container { position: relative; min-height: 400px; width: 100%; }
        .nx-editor { position: absolute; top: 0; left: 0; right: 0; bottom: 0; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 14px; }
        /* CM6: fill container and enable native scrolling */
        .nx-editor .cm-editor { height: 100%; }
        .nx-editor .cm-scroller { overflow: auto; }
    </style>
</head>
<body class="bg-base-200 min-h-screen font-sans antialiased text-base-content" data-class-nexus-ready="appReady" data-on-load.window="appReady = true">

    <div class="nexus-progress-mount" data-class-hidden="appReady">
        <progress class="progress progress-primary w-full"></progress>
    </div>

    <main class="relative p-6">
        <div data-component="'/examples/dashboard/components/document.html'">
        </div>
    </main>

</body>
</html>
