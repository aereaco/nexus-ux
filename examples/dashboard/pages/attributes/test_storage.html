<!DOCTYPE html>
<html lang="en" data-ux-init data-debug
      data-signal="{ 
          count: Number(_localStorage.test_count || 0),
          increment: () => {
              count++;
              _localStorage.test_count = count;
          }
      }">
<head>
    <meta charset="UTF-8">
    <title>Storage Test</title>
    <script type="module" src="../../../../dist/nexus-ux.js"></script>
</head>
<body class="p-8">
    <h1 class="text-2xl font-bold mb-4 text-primary">Persistence Test</h1>
    <div class="card bg-base-100 shadow-xl p-6 border border-base-300">
        <p class="text-xl mb-4">Count: <span class="font-bold text-secondary" data-text="#count"></span></p>
        <button class="btn btn-primary" data-on-click="#increment()">Increment & Save</button>
        <button class="btn btn-ghost mt-4" data-on-click="_window.location.reload()">Reload Page</button>
    </div>
    
    <div class="mt-8 p-4 bg-base-200 rounded text-xs font-mono">
        LocalStorage RAW: <span data-text="_localStorage.getItem('test_count')"></span>
    </div>
</body>
</html>
