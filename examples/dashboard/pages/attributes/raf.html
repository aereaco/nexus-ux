<!DOCTYPE html>
<html lang="en" data-ux-init data-debug
      data-injest="{
          daisy: { link: 'https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css' },
          tailwind: { script: 'https://cdn.tailwindcss.com' },
      }"
      data-signal="{
          doc: {
            Title: 'data-raf',
            Description: 'Demonstrates the &lt;code&gt;data-raf&lt;/code&gt; module binding arbitrary logic executions directly into the native browser &lt;code&gt;requestAnimationFrame&lt;/code&gt; loop for bleeding-edge 60FPS mathematically smooth logic.',
            Syntax: '&lt;div data-raf=\&quot;gameLoopLogic()\&quot;&gt;&lt;/div&gt;',
            SourceModule: '/modules/attributes/raf.ts',
            SnippetModule: '/examples/dashboard/pages/attributes/raf.html',
            Extensibility: '&lt;p class=\&quot;opacity-80 mt-4 leading-relaxed\&quot;&gt;Frame pipeline hooks inside &lt;code&gt;src/modules/attributes/raf.ts&lt;/code&gt; execute directly 60 times a second natively. Optimize internal DOM nodes recursively to bypass AST latency during canvas renders.&lt;/p&gt;',
            Snippet: '&lt;div class=\&quot;p-8 bg-base-200 rounded-box border shadow-inner\&quot;&gt;\n    &lt;!-- High Frequency Logic Runner Bound to Render Frames --&gt;\n    &lt;div class=\&quot;stats shadow bg-base-100 w-full\&quot;\n         data-raf=\&quot;\n             hardwareLoops++;\n             const now = performance.now();\n             const delta = now - lastTime;\n             if (delta &gt;= 1000) {\n                 fps = Math.round((hardwareLoops * 1000) / delta);\n                 hardwareLoops = 0;\n                 lastTime = now;\n             }\n         \&quot;&gt;\n         \n        &lt;div class=\&quot;stat place-items-center\&quot;&gt;\n            &lt;div class=\&quot;stat-title text-lg font-bold\&quot;&gt;Hardware RAF Cycle Binding&lt;/div&gt;\n            &lt;div class=\&quot;stat-value text-accent text-6xl my-2\&quot; data-text=\&quot;fps\&quot;&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-desc font-bold text-lg\&quot;&gt;Frames Per Second Measured&lt;/div&gt;\n        &lt;/div&gt;\n    &lt;/div&gt;\n&lt;/div&gt;'
          },
          appReady: false,
          fps: 0,
          hardwareLoops: 0,
          lastTime: performance.now()
      }">
<head>
    <meta charset="UTF-8">
    <title>Nexus-UX | data-raf</title>
    <script type="module" src="../../../../dist/nexus-ux.js"></script>
    <style>
        progress { appearance: none; -webkit-appearance: none; border: none; background: transparent; height: 0.5rem; margin: 0; display: block; }
        progress::-webkit-progress-bar { background-color: rgba(166, 173, 187, 0.2); }
        progress::-webkit-progress-value { background-color: #570df8; }
        progress::-moz-progress-bar { background-color: #570df8; }
        main { opacity: 0; transition: opacity 0.5s ease-in; }
        .nexus-ready main { opacity: 1; }
        .nexus-progress-mount { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; }
        .nx-editor-container { position: relative; min-height: 400px; width: 100%; }
        .nx-editor { position: absolute; top: 0; left: 0; right: 0; bottom: 0; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 14px; }
        /* CM6: fill container and enable native scrolling */
        .nx-editor .cm-editor { height: 100%; }
        .nx-editor .cm-scroller { overflow: auto; }
    </style>
</head>
<body class="bg-base-200 min-h-screen font-sans antialiased text-base-content" data-class-nexus-ready="appReady" data-on-load.window="appReady = true">

    <div class="nexus-progress-mount" data-class-hidden="appReady">
        <progress class="progress progress-primary w-full"></progress>
    </div>

    <main class="relative p-6">
        <div data-component="'/examples/dashboard/components/document.html'">
        </div>
    </main>

</body>
</html>
