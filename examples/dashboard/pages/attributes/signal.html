      data-signal="{
          doc: {
            Title: 'data-signal',
            Description: 'Demonstrates defining explicitly isolated context blocks inside the DOM namespace mapping JSON literals to the AST Memory Engine via data-signal.',
            Syntax: '&lt;div data-signal=\&quot;{ localCount: 0 }\&quot;&gt;&lt;/div&gt;',
            SourceModule: '/modules/attributes/signal.ts',
            SnippetModule: '/examples/dashboard/pages/attributes/signal.html',
            Extensibility: '&lt;p class=\&quot;opacity-80 mt-4 leading-relaxed\&quot;&gt;Located in &lt;code&gt;src/modules/attributes/signal.ts&lt;/code&gt;, the signal directive parses JSON object literals and creates reactive state scopes. Signals cascade from parent to child nodes via the DOM data stack, enabling true DOM-as-State composition.&lt;/p&gt;&lt;ul class=\&quot;list-disc list-inside opacity-80 mt-3 space-y-1\&quot;&gt;&lt;li&gt;&lt;strong&gt;Local signals&lt;/strong&gt; — Scoped to the element and its descendants&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Global signals&lt;/strong&gt; — Use &lt;code&gt;data-signal:global&lt;/code&gt; or &lt;code&gt;data-ux-init&lt;/code&gt; for app-wide state&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Nested inheritance&lt;/strong&gt; — Child signals inherit parent scope automatically&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Persistence&lt;/strong&gt; — Combine with &lt;code&gt;_sessionStorage&lt;/code&gt;, &lt;code&gt;_localStorage&lt;/code&gt;, or &lt;code&gt;_indexedDB&lt;/code&gt; mirrors&lt;/li&gt;&lt;/ul&gt;',
            Snippet: '&lt;div&gt;\n    &lt;h3 class=\&quot;font-bold text-xl uppercase opacity-60 mb-6\&quot;&gt;\n        Inherited Parent Data\n    &lt;/h3&gt;\n    &lt;div class=\&quot;stats bg-base-100 shadow mb-8 border border-base-300 w-full\&quot;&gt;\n        &lt;div class=\&quot;stat\&quot;&gt;\n            &lt;div class=\&quot;stat-title font-bold\&quot;&gt;Cluster ID&lt;/div&gt;\n            &lt;div class=\&quot;stat-value text-primary font-mono text-2xl\&quot; data-text=\&quot;cluster.id\&quot;&gt;&lt;/div&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;stat\&quot;&gt;\n            &lt;div class=\&quot;stat-title font-bold\&quot;&gt;Active Nodes&lt;/div&gt;\n            &lt;div class=\&quot;stat-value text-secondary\&quot; data-text=\&quot;cluster.nodes\&quot;&gt;&lt;/div&gt;\n            &lt;div class=\&quot;stat-desc mt-3 flex gap-2\&quot;&gt;\n                &lt;button class=\&quot;btn btn-sm btn-outline btn-secondary font-bold\&quot; data-on-click=\&quot;cluster.nodes++\&quot;&gt;Add&lt;/button&gt;\n                &lt;button class=\&quot;btn btn-sm btn-outline btn-error font-bold\&quot; data-on-click=\&quot;cluster.nodes--\&quot;&gt;Remove&lt;/button&gt;\n            &lt;/div&gt;\n        &lt;/div&gt;\n    &lt;/div&gt;\n    &lt;div data-signal=\&quot;{ activeProcess: \'Training Model X\' }\&quot;\n         class=\&quot;p-6 bg-accent/10 rounded-xl border border-accent/40 shadow\&quot;&gt;\n        &lt;h3 class=\&quot;font-bold text-xl text-accent mb-4\&quot;&gt;Nested Boundaries&lt;/h3&gt;\n        &lt;div class=\&quot;form-control mb-4\&quot;&gt;\n            &lt;label class=\&quot;label\&quot;&gt;&lt;span class=\&quot;label-text font-bold text-accent\&quot;&gt;Child: activeProcess&lt;/span&gt;&lt;/label&gt;\n            &lt;input type=\&quot;text\&quot; data-model=\&quot;activeProcess\&quot; class=\&quot;input input-bordered border-accent bg-base-100 w-full\&quot;&gt;\n        &lt;/div&gt;\n        &lt;div class=\&quot;form-control\&quot;&gt;\n            &lt;label class=\&quot;label\&quot;&gt;&lt;span class=\&quot;label-text font-bold text-primary\&quot;&gt;Parent: cluster.id&lt;/span&gt;&lt;/label&gt;\n            &lt;input type=\&quot;text\&quot; data-model=\&quot;cluster.id\&quot; class=\&quot;input input-bordered border-primary bg-base-100 w-full\&quot;&gt;\n        &lt;/div&gt;\n    &lt;/div&gt;\n&lt;/div&gt;'
          },
          appReady: false,
          engine: 15,
          cluster: { id: 'us-east-1', nodes: 24, bandwidth: { rx: '40Gbps', tx: '12Gbps' } }
      }">
<head>
