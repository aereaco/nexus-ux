<!DOCTYPE html>
<html lang="en" data-ux-init data-debug
      data-injest="{
          daisy: { link: 'https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css' },
          tailwind: { script: 'https://cdn.tailwindcss.com' },
      }"
      data-signal="{
          doc: {
            Title: 'data-bind',
            Description: 'This page demonstrates massive object-level property binding via &lt;code&gt;data-bind&lt;/code&gt; mapping directly onto native DOM Node properties (like &lt;code&gt;type&lt;/code&gt; and &lt;code&gt;value&lt;/code&gt;).',
            Syntax: '&lt;div data-bind=\&quot;{ id: elementId, class: dynamicClass }\&quot;&gt;&lt;/div&gt;',
            SourceModule: '/modules/attributes/bind.ts',
            SnippetModule: '/examples/dashboard/pages/attributes/bind.html',
            Extensibility: '&lt;p class=\&quot;opacity-80 mt-4 leading-relaxed\&quot;&gt;The object binder in &lt;code&gt;src/modules/attributes/bind.ts&lt;/code&gt; parses JS objects into raw node properties. Easily hooked to transform object keys into &lt;code&gt;data-*&lt;/code&gt; compliant datasets.&lt;/p&gt;',
            Snippet: '&lt;div class=\&quot;p-8 bg-base-200 rounded-box border shadow-inner\&quot;&gt;\n    &lt;div class=\&quot;form-control mb-6\&quot;&gt;\n        &lt;label class=\&quot;label\&quot;&gt;\n            &lt;span class=\&quot;label-text font-bold\&quot;&gt;Object Binding Input Node&lt;/span&gt;\n        &lt;/label&gt;\n        \n        &lt;!-- Binds the entire customProps object directly onto the element\'s properties --&gt;\n        &lt;input data-bind=\&quot;customProps\&quot; data-attr-type=\&quot;nativeType\&quot; class=\&quot;input input-bordered input-primary w-full\&quot;&gt;\n    &lt;/div&gt;\n    \n    &lt;div class=\&quot;divider\&quot;&gt;Memory Controls&lt;/div&gt;\n    \n    &lt;div class=\&quot;flex flex-wrap gap-4 items-center\&quot;&gt;\n        &lt;button class=\&quot;btn btn-warning btn-sm shadow\&quot; data-on-click=\&quot;customProps.disabled = !customProps.disabled\&quot;&gt;\n            Toggle Node Disabled State\n        &lt;/button&gt;\n        \n        &lt;button class=\&quot;btn btn-info btn-sm shadow\&quot; data-on-click=\&quot;nativeType = nativeType === \'password\' ? \'text\' : \'password\'\&quot;&gt;\n            Mutate Input Type\n        &lt;/button&gt;\n        \n        &lt;button class=\&quot;btn btn-accent btn-sm shadow\&quot; data-on-click=\&quot;customProps.value = \'HACKED_\' + Date.now()\&quot;&gt;\n            Overwrite Node Value\n        &lt;/button&gt;\n    &lt;/div&gt;\n&lt;/div&gt;'
          },
          appReady: false,
          customProps: { disabled: false, value: 'Initial Value' },
          nativeType: 'text'
      }">
<head>
    <meta charset="UTF-8">
    <title>Nexus-UX | data-bind</title>
    <script type="module" src="../../../../dist/nexus-ux.js"></script>
    <style>
        progress { appearance: none; -webkit-appearance: none; border: none; background: transparent; height: 0.5rem; margin: 0; display: block; }
        progress::-webkit-progress-bar { background-color: rgba(166, 173, 187, 0.2); }
        progress::-webkit-progress-value { background-color: #570df8; }
        progress::-moz-progress-bar { background-color: #570df8; }
        main { opacity: 0; transition: opacity 0.5s ease-in; }
        .nexus-ready main { opacity: 1; }
        .nexus-progress-mount { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; }
        .nx-editor-container { position: relative; min-height: 400px; width: 100%; }
        .nx-editor { position: absolute; top: 0; left: 0; right: 0; bottom: 0; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 14px; }
        /* CM6: fill container and enable native scrolling */
        .nx-editor .cm-editor { height: 100%; }
        .nx-editor .cm-scroller { overflow: auto; }
    </style>
</head>
<body class="bg-base-200 min-h-screen font-sans antialiased text-base-content" data-class-nexus-ready="appReady" data-on-load.window="appReady = true">

    <div class="nexus-progress-mount" data-class-hidden="appReady">
        <progress class="progress progress-primary w-full"></progress>
    </div>

    <main class="relative p-6">
        <div data-component="'/examples/dashboard/components/document.html'">
        </div>
    </main>

</body>
</html>
