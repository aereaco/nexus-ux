<!DOCTYPE html>
<html
  lang="en"
  data-ux-init
  data-debug
  data-injest="{
          daisy: { link: 'https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css' },
          tailwind: { script: 'https://cdn.tailwindcss.com' },
      }"
  data-signal="{
          doc: {
            Title: 'data-animate',
            Description: 'Demonstrates Native WAAPI (Web Animations API) bindings mapped mathematically to HTML5 attributes using &lt;code&gt;data-animate-*&lt;/code&gt; hooks.',
            Syntax: '&lt;div data-animate=\&quot;hover:scale-110\&quot;&gt;&lt;/div&gt;',
            SourceModule: '/modules/attributes/animate.ts',
            SnippetModule: '/examples/dashboard/pages/attributes/animate.html',
            Extensibility: '&lt;p class=\&quot;opacity-80 mt-4 leading-relaxed\&quot;&gt;Native element animation defined via &lt;code&gt;src/modules/attributes/animate.ts&lt;/code&gt; natively controls the Web Animations API. Hook into this to support FLIP layout physics natively.&lt;/p&gt;',
            Snippet: '&lt;div class=\&quot;mt-4 flex flex-col items-center justify-center p-12 bg-base-200 rounded-box border shadow-inner\&quot;&gt;\n    &lt;div class=\&quot;w-32 h-32 bg-primary text-primary-content shadow-2xl rounded-2xl flex items-center justify-center font-bold text-center text-xl cursor-pointer select-none animate-box\&quot; data-animate-click=\&quot;[\n            { transform: \'scale(1)\', borderRadius: \'1rem\', backgroundColor: \'#4f46e5\' },\n            { transform: \'scale(0.8) rotate(-45deg)\', borderRadius: \'50%\', backgroundColor: \'#ec4899\', offset: 0.3 },\n            { transform: \'scale(1.2) rotate(45deg)\', borderRadius: \'0\', backgroundColor: \'#eab308\', offset: 0.7 },\n            { transform: \'scale(1)\', borderRadius: \'1rem\', backgroundColor: \'#4f46e5\' }\n         ]\&quot; data-animate-click-options=\&quot;{ duration: 800, easing: \'ease-in-out\' }\&quot;&gt;\n        Click to&lt;br&gt;Animate\n    </div>\n</div>'
          },
          appReady: false
      }"
>
  <head>
    <meta charset="UTF-8">
    <title>Nexus-UX | data-animate</title>
    <script type="module" src="../../../../dist/nexus-ux.js"></script>
    <style>
      progress {
        appearance: none;
        -webkit-appearance: none;
        border: none;
        background: transparent;
        height: 0.5rem;
        margin: 0;
        display: block;
      }
      progress::-webkit-progress-bar {
        background-color: rgba(166, 173, 187, 0.2);
      }
      progress::-webkit-progress-value {
        background-color: #570df8;
      }
      progress::-moz-progress-bar {
        background-color: #570df8;
      }
      main {
        opacity: 0;
        transition: opacity 0.5s ease-in;
      }
      .nexus-ready main {
        opacity: 1;
      }
      .nexus-progress-mount {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 9999;
      }
      .nx-editor-container {
        position: relative;
        min-height: 400px;
        width: 100%;
      }
      .nx-editor {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        font-family: "Fira Code", "Cascadia Code", monospace;
        font-size: 14px;
      }
    </style>
  </head>
  <body
    class="bg-base-200 min-h-screen font-sans antialiased text-base-content"
    data-class-nexus-ready="appReady"
    data-on-load.window="appReady = true"
  >
    <div class="nexus-progress-mount" data-class-hidden="appReady">
      <progress class="progress progress-primary w-full"></progress>
    </div>

    <main class="relative p-6">
      <div data-component="'/examples/dashboard/components/document.html'">
      </div>
    </main>
  </body>
</html>
