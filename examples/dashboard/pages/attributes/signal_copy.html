<!DOCTYPE html>
<html lang="en" data-ux-init data-debug
      data-injest="{
          daisy: { link: 'https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css' },
          tailwind: { script: 'https://cdn.tailwindcss.com' },
          ace: { script: 'https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js' }
      }"
      data-signal="{
          doc: $get('signal.json'),
          appReady: false,
          engine: 15,
          cluster: { id: 'us-east-1', nodes: 24, bandwidth: { rx: '40Gbps', tx: '12Gbps' } }
      }">
<head>
    <meta charset="UTF-8">
    <title>Nexus-UX | data-signal</title>
    <script type="module" src="../../../../dist/nexus-ux.js?v=4002"></script>
    <style>
        .nexus-progress-mount { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; }
    </style>
</head>
<body class="bg-base-200 min-h-screen font-sans antialiased text-base-content">

    <main class="relative p-6">
        <!-- Component Orchestration -->
        <div data-component="'/examples/dashboard/components/document.html'"
             data-prop-doc="doc">
        </div>
    </main>

    <!-- Global Trace -->
    <div class="fixed bottom-4 left-4 z-50 pointer-events-none opacity-20 hover:opacity-100 transition-opacity">
        <div class="badge badge-outline badge-sm font-mono" data-text="'Engine: ' + (engine || _NEXUS_HEARTBEAT || 15)"></div>
    </div>
</body>
</html>
