<!DOCTYPE html>
<html lang="en" data-ux-init data-debug
      data-injest="{
          daisy: { link: 'https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css' },
          tailwind: { script: 'https://cdn.tailwindcss.com' },
          ace: { script: 'https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.7/ace.js' }
      }"
      data-signal="{
          doc: {
            Title: 'data-show',
            Description: 'This page demonstrates layout toggling modifying the native &lt;code&gt;display&lt;/code&gt; CSS property via &lt;code&gt;data-show&lt;/code&gt;.',
            Syntax: '&lt;div data-show=\&quot;isVisible\&quot;&gt;Toggled Display&lt;/div&gt;',
            SourceModule: '/modules/attributes/show.ts',
            SnippetModule: '/examples/dashboard/pages/attributes/show.html',
            Extensibility: '&lt;ul class=\&quot;list-disc list-inside opacity-80 mt-3 space-y-1\&quot;&gt;\n  &lt;li&gt;The visibility toggler in &lt;code&gt;src/modules/attributes/show.ts&lt;/code&gt; strictly maps to &lt;code&gt;display: none&lt;/code&gt;.&lt;/li&gt;\n  &lt;li&gt;This can be adapted to toggle CSS classes like &lt;code&gt;.hidden&lt;/code&gt; for Tailwind synergy natively.&lt;/li&gt;\n&lt;/ul&gt;',
            Snippet: '&lt;div class=\&quot;p-8 bg-base-200 rounded-box border shadow-inner\&quot;&gt;\n    &lt;button class=\&quot;btn btn-primary shadow-lg mb-8\&quot; data-on-click=\&quot;blockVisible = !blockVisible\&quot;&gt;\n        Toggle Visibility\n    &lt;/button&gt;\n    &lt;div data-show=\&quot;blockVisible\&quot; class=\&quot;p-8 bg-warning text-warning-content rounded-xl font-bold text-center text-3xl shadow-xl transition-opacity duration-300\&quot;&gt;\n        I am structurally permanent but visually togglable!\n    &lt;/div&gt;\n&lt;/div&gt;'
          },
          appReady: false,
          blockVisible: true
      }">
<head>
    <meta charset="UTF-8">
    <title>Nexus-UX | data-show</title>
    <script type="module" src="../../../../dist/nexus-ux.js"></script>
    <style>
        progress { appearance: none; -webkit-appearance: none; border: none; background: transparent; height: 0.5rem; margin: 0; display: block; }
        progress::-webkit-progress-bar { background-color: rgba(166, 173, 187, 0.2); }
        progress::-webkit-progress-value { background-color: #570df8; }
        progress::-moz-progress-bar { background-color: #570df8; }
        main { opacity: 0; transition: opacity 0.5s ease-in; }
        .nexus-ready main { opacity: 1; }
        .nexus-progress-mount { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; }
        .nx-editor-container { position: relative; min-height: 400px; width: 100%; }
        .nx-editor { position: absolute; top: 0; left: 0; right: 0; bottom: 0; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 14px; }
    </style>
</head>
<body class="bg-base-200 min-h-screen font-sans antialiased text-base-content" data-class-nexus-ready="appReady" data-on-load.window="appReady = true">

    <div class="nexus-progress-mount" data-class-hidden="appReady">
        <progress class="progress progress-primary w-full"></progress>
    </div>

    <main class="relative p-6">
        <div data-component="'/examples/dashboard/components/document.html'">
        </div>
    </main>

</body>
</html>
