<!DOCTYPE html>
<html lang="en" data-ux-init>
<head>
    <meta charset="UTF-8">
    <title>svg probe2</title>
    <script type="module" src="/dist/nexus-ux.js"></script>
</head>
<body data-var="{ edges: [{a:'1',b:'2'}], nodes:[{id:'1'},{id:'2'}] }" style="margin:0">
    <div id="node-1" style="position:absolute;left:10px;top:10px;width:80px;height:40px;background:red"></div>
    <div id="node-2" style="position:absolute;left:200px;top:10px;width:80px;height:40px;background:green"></div>
    <div data-flow="nodes" data-flow-grid="20" style="position:relative;width:400px;height:200px">
        <svg style="position:absolute;inset:0;overflow:visible">
            <path data-for="edge in edges"
                  data-bind-d="$svg.connect($(`#node-${edge.a}`), $(`#node-${edge.b}`)).d"
                  fill="none" stroke="currentColor" stroke-width="2"></path>
        </svg>
    </div>
</body>
</html>
