<!DOCTYPE html>
<html lang="en" data-theme="dark" data-debug data-ux-init>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial Canvas Drag - Nexus-UX</title>
    <script type="module" src="/dist/nexus-ux.js"></script>
    <style>
        :root {
            --canvas-bg: #0f172a;
            --grid-color: rgba(255, 255, 255, 0.05);
            --node-bg: #1e293b;
            --node-border: #334155;
            --node-text: #f8fafc;
            --accent: #38bdf8;
        }

        body {
            margin: 0;
            background: var(--canvas-bg);
            color: var(--node-text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 1rem 2rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--node-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .canvas {
            flex: 1;
            position: relative;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 20px 20px;
            cursor: crosshair;
        }

        .node {
            position: absolute;
            left: 0;
            top: 0;
            width: 150px;
            padding: 12px;
            background: var(--node-bg);
            border: 1px solid var(--node-border);
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            cursor: grab;
            user-select: none;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .node:active {
            cursor: grabbing;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: var(--accent);
        }

        .node-id {
            font-size: 0.75rem;
            color: var(--accent);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .node-label {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .node-pos {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 8px;
        }

        .controls {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            gap: 1rem;
        }

        button {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .debug-panel {
            position: absolute;
            top: 5rem;
            left: 1rem;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--node-border);
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.75rem;
            width: 14rem;
            pointer-events: none;
        }
    </style>
</head>
<body data-var="{
    nodes: [
        { id: '1', label: 'Start Node', position: { x: 300, y: 20 } },
        { id: '2', label: 'Processing', position: { x: 300, y: 120 } },
        { id: '3', label: 'End Node', position: { x: 300, y: 220 } }
    ]
}">
    <div class="header">
        <h1 class="text-xl font-bold">Nexus-UX xyFlow Spatial Canvas</h1>
        <div class="flex gap-4">
            <span class="text-sm opacity-60">Engine: <strong>SpatialCanvasEngine</strong></span>
            <span class="text-sm opacity-60">Mode: <strong>xyFlow Absolute</strong></span>
        </div>
    </div>

    <div class="canvas" data-spatial="canvas" data-teleport:drop="nodes">
        <div data-for="node in nodes" 
             class="node" 
             data-drag="node.id"
             data-bind-style="{ transform: 'translate3d(' + node.position.x + 'px, ' + node.position.y + 'px, 0)' }">
            <div class="node-id"># <span data-bind="node.id"></span></div>
            <div class="node-label" data-bind="node.label"></div>
            <div class="node-pos">X: <span data-bind="node.position.x"></span>, Y: <span data-bind="node.position.y"></span></div>
        </div>
    </div>

    <div class="debug-panel">
        <div class="mb-2 border-b border-slate-700 pb-1 text-slate-400">Reactive Store</div>
        <div data-for="node in nodes" class="text-xs mb-2">
            ID <span data-bind="node.id"></span>: <span data-bind="node.label"></span><br>
            (X:<span data-bind="node.position.x"></span>, Y:<span data-bind="node.position.y"></span>)
        </div>
    </div>

    <div class="controls">
        <button data-on-click="nodes.push({ 
            id: String(nodes.length + 1), 
            label: 'New Node ' + (nodes.length + 1), 
            position: { x: Math.random() * 400 + 50, y: Math.random() * 300 + 50 } 
        })">Add Node</button>
        <button data-on-click="nodes.splice(0, nodes.length)">Clear</button>
    </div>
</body>
</html>
