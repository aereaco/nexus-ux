<div class="layout-shell" style="border:2px solid #6a5acd; padding:10px;">
  <p id="layout-marker" style="color:#6a5acd; font-weight:bold;">MAIN LAYOUT</p>
  <p>layout sees path: <span id="layout-path" data-bind="$router.path"></span></p>
  <!-- Inner view outlet: renders the matched route's component inside the layout -->
  <main id="layout-outlet" data-component="$router.route"></main>
</div>
