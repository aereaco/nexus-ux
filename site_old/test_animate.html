<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus-UX: Universal Animations & Intersect</title>
    <script type="module" src="/dist/nexus-ux.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; background: #0f172a; color: white; }
        .box {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            margin-top: 2rem;
        }

        button {
            background: #cbd5e1;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: #0f172a;
        }

        button:hover { background: #f8fafc; }

        /* Utility classes mirroring Tailwind for testing the programmatic API */
        .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
        .duration-500 { transition-duration: 500ms; }
        .duration-1000 { transition-duration: 1000ms; }
        .ease-out { transition-timing-function: cubic-bezier(0.0, 0, 0.2, 1); }
        .opacity-0 { opacity: 0; }
        .opacity-100 { opacity: 1; }
        .scale-90 { transform: scale(.9); }
        .scale-100 { transform: scale(1); }
        .-translate-x-full { transform: translateX(-100%); }
        .translate-x-0 { transform: translateX(0); }

        /* Spacer for Intersect Test */
        .spacer { height: 150vh; }
        
        .lazy-box {
            width: 100%;
            padding: 3rem;
            background: #1e293b;
            border-radius: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Universal Animations & pipeline Modifiers</h1>

    <div class="card" data-ux-init data-signal="{ isOpen: false, loaded: false }">
        
        <!-- Toggle logic uses the Pure Sprite API with 6-stage Alpine config -->
        <button data-on-click="
            if (isOpen) {
                $animate($('.box'), 'leave', {
                    leave: 'transition-all duration-500 ease-out',
                    leaveStart: 'opacity-100 scale-100',
                    leaveEnd: 'opacity-0 scale-90'
                }, () => isOpen = false);
            } else {
                isOpen = true;
                $animate($('.box'), 'enter', {
                    enter: 'transition-all duration-500 ease-out',
                    enterStart: 'opacity-0 scale-90',
                    enterEnd: 'opacity-100 scale-100'
                });
            }
        ">
            <span data-text="isOpen ? 'Close Box' : 'Open Box'"></span>
        </button>

        <div data-show="isOpen" class="box">
            <span>Dynamic DOM</span>
        </div>

        <div class="spacer">Scroll Down to trigger Universal Pipeline Lazy Loading</div>

        <!-- 
          Intersect Hook dynamically firing the $animate engine on scroll.
          We place the observer on a wrapper so it exists in the DOM layout 
          even when the inner box is hidden via data-show!
        -->
        <div style="min-height: 150px; display: flex; align-items: center; justify-content: center;"
             data-effect.intersect.once="
                loaded = true;
                $animate($('.lazy-box'), 'enter', {
                    enter: 'transition-all duration-1000 ease-out',
                    enterStart: 'opacity-0 -translate-x-full',
                    enterEnd: 'opacity-100 translate-x-0'
                });
             ">
            <div data-show="loaded" class="lazy-box">
                 <h2>✨ Universal `:intersect` Triggered! ✨</h2>
                 <p>This component was lazy loaded without any manual JS logic.</p>
            </div>
        </div>
    </div>

</body>
</html>
