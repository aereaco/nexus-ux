      </div>

      </div>

        </button>

            <iconify-icon icon="material-symbols-light:notifications" style="font-size: 24px"></iconify-icon>
            <span class="badge badge-xs badge-primary indicator-item"></span>

        </button>

    <!-- Dynamic Router Outlet / Component Insertion -->
    <div data-if="dashboardComponent" class="w-full h-full relative" data-component="dashboardComponent"></div>

    <!-- Default Diagnostic Content (fallback if no route component provided) -->
    <div data-if="!dashboardComponent">
      <div class="p-4 text-2xl font-bold">Nexus-UX Engine Layout Shell</div>
      <p class="pb-4 ps-4 text-accent" data-bind="'Windows Size: ' + _window.innerWidth"></p>
      <p class="pb-4 ps-4 text-secondary" data-bind="'Windows Size < 1024 (Mobile Match): ' + isMobile"></p>
      <p class="pb-4 ps-4 text-info" data-bind="'Sidebar Collapsed: ' + collapsed"></p>
      <p class="pb-4 ps-4 text-success" data-bind="'Sidebar Hovered: ' + hovered"></p>
    </div>
  </div>

  <div class="drawer-side" data-class="{ 'overflow-visible': hovered || !collapsed || isMobile }">
    <label for="my-drawer-4" aria-label="close sidebar" class="drawer-overlay"></label>
    <div class="flex min-h-full flex-col items-start bg-base-100" data-class="{ 'lg:w-16': collapsed, 'w-[20vw]': !collapsed, 'w-[75vw]': isMobile }">
      <!-- Sidebar content here -->
      <div class="flex flex-col h-dvh w-full transition-all" data-class="{ 'lg:w-[20vw]': !collapsed || hovered, 'w-[75vw]': isMobile, 'bg-base-100/70': !collapsed || hovered || isMobile, 'backdrop-blur-sm': !collapsed || hovered || isMobile }"
      data-on-mouseenter="hovered = true"
      data-on-mouseleave="hovered = false"
      data-on-touchstart="hovered = true"
      >
        <div class="navbar">
          <div class="flex flex-1">
            <a class="btn btn-ghost text-xl ps-1">
              <svg class="w-10 h-10 scale-[0.8]">
                <use href="/site/_assets/images/emblem.svg"></use>
              </svg>
              <template data-if="!collapsed || hovered || isMobile">
                <span>Nexus-UX</span>
              </template>
            </a>
          </div>
         
        </div>
        

        <ul class="menu w-full grow">
          <!-- List item -->
          <li class="transition-transform duration-300 hover:scale-105 hover:aura hover:aura-glow">
            <button>
              <!-- Home icon -->
              <iconify-icon icon="material-symbols-light:home-outline" style="font-size: 24px"></iconify-icon>
              <span data-class="{ 'hidden': collapsed && !hovered && !isMobile }">Homepage</span>
            </button>
          </li>

          <!-- List item -->
          <li class="transition-transform duration-300 hover:scale-105">
            <button>
              <!-- Settings icon -->
              <iconify-icon icon="material-symbols-light:settings-outline" style="font-size: 24px"></iconify-icon>
              <span data-class="{ 'hidden': collapsed && !hovered && !isMobile }">Settings</span>
            </button>
          </li>
        </ul>

        <template data-if="collapsed && !hovered && !isMobile">
          <div class="dock">
            <iconify-icon icon="material-symbols-light:left-panel-open-outline" style="font-size: 24px"></iconify-icon>
          </div>
        </template>
        <template data-if="!collapsed || hovered || isMobile">
          <div class="dock">
          <button class="tooltip tooltip-top" data-tip="Guide">
            <iconify-icon icon="material-symbols-light:list" style="font-size: 24px"></iconify-icon>
          </button>

          <button class="tooltip tooltip-top" data-tip="Favorites">
            <iconify-icon icon="material-symbols-light:star-outline" style="font-size: 24px"></iconify-icon>
          </button>
          
          <button class="tooltip tooltip-top" data-tip="Settings">
            <iconify-icon icon="material-symbols-light:tune" style="font-size: 24px"></iconify-icon>
          </button>
        </div>
      </div>
    </div>
