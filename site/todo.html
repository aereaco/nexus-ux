<!DOCTYPE html>
<html lang="en" data-ux-init data-debug data-theme="dark"
    data-pwa="{ themeColor: '#570df8', icon: '/site/_assets/images/emblem.svg', manifest: '/dist/manifest.json' }" data-stylesheet data-import="{
        'DaisyUI': {
          link: [
            { href: 'https://cdn.jsdelivr.net/npm/daisyui@5' },
            { href: 'https://cdn.jsdelivr.net/npm/daisyui@5/themes.css' }
          ]
        },
        'Iconify': {
          script: { src: 'https://cdn.jsdelivr.net/npm/iconify-icon@3.0.0/dist/iconify-icon.min.js' }
        },
        'testPlugin': {
          script: { src: '/site/todo-plugin.js' }
        }
      }" data-ux-theme="{
        default: 'auto',
        modes: {
            auto:  { icon: 'material-symbols-light:routine-outline' },
            light: { icon: 'material-symbols-light:light-mode-outline', theme: 'fantasy' },
            dark:  { icon: 'material-symbols-light:dark-mode-outline', theme: 'synthwave' }
        }
    }" data-signal="{
        todos: (() => {
            try {
                const stored = localStorage.getItem('todos');
                return stored ? JSON.parse(stored) : [];
            } catch (_) {
                return [];
            }
        })(),
        newTodo: '',
        filter: 'all',
        layout: 'list',
        activeTodo: null,
        isEditing: false,
        showConfirmDelete: false,
        showConfirmClear: false,
        editTempText: '',
        $saveTodos: (t) => {
            progress = 20;
            _localStorage.todos = t;
            setTimeout(() => progress = 100, 300);
            setTimeout(() => progress = 0, 800);
        }
    }" data-signal:global="{ progress: 0 }" data-computed="{
        filteredTodos: () => {
            const f = filter;
            const list = todos;
            if (f === 'active')    return list.filter(t => !t.completed);
            if (f === 'completed') return list.filter(t =>  t.completed);
            return list;
        },
        remaining: () => todos.filter(t => !t.completed).length
    }">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus-UX • Advanced Todo</title>

    <script type="module" src="/dist/nexus-ux.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body
    class="min-h-screen flex flex-col items-center justify-start py-12 px-4 transition-colors duration-500 bg-gradient-to-br from-base-300 via-base-100 to-base-200">

    <!-- Top Progress Bar (DaisyUI native progress) -->
    <progress class="progress progress-primary fixed top-0 left-0 w-full z-[9999] pointer-events-none h-1 rounded-none"
        data-show="#progress > 0 || isEditing" data-attr:value="isEditing ? null : #progress" max="100"></progress>

    <!-- PWA Installation Widget -->
    <div data-if="$pwa && !$pwa.isInstalled && $pwa.deferredPrompt"
        class="fixed bottom-4 right-4 bg-primary text-primary-content p-4 rounded-lg shadow-xl z-50 flex items-center gap-4">
        <span>Install Nexus-UX Todo as an App!</span>
        <button class="btn btn-sm btn-active border-none" data-on-click="$pwa.install()">Install</button>
    </div>

    <!-- PWA Update Widget -->
    <div data-if="$pwa && $pwa.updateAvailable"
        class="fixed bottom-4 left-4 bg-accent text-accent-content p-4 rounded-lg shadow-xl z-50 flex items-center gap-4">
        <span>A new version is available!</span>
        <button class="btn btn-sm border-none" data-on-click="$pwa.update()">Reload &amp; Update</button>
    </div>

    <!-- Theme Switcher -->
    <div class="fixed top-6 right-6 z-50">
        <button
            class="btn btn-circle btn-lg shadow-lg bg-base-100 border border-base-300 hover:scale-110 active:scale-95 transition-all"
            data-on-click="$switchTheme()">
            <iconify-icon data-attr:icon="$themeIcon" class="text-2xl transition-all duration-300"></iconify-icon>
        </button>
    </div>

    <!-- Main Card (data-test-plugin: demonstrates Nexus-UX's 3rd-party plugin API) -->
    <div class="card w-full max-w-2xl bg-base-100/90 backdrop-blur-md shadow-2xl border border-base-300 transition-all duration-500 overflow-visible relative"
        data-test-plugin="yay!">
        <div class="card-body gap-8 p-6 sm:p-8">

            <!-- Header -->
            <header class="flex flex-col sm:flex-row justify-between items-center gap-4">
                <h1 class="text-4xl font-bold tracking-tight text-primary">Nexus-UX</h1>

                <!-- Layout Toggles -->
                <div class="join bg-base-200 p-1 rounded-box shadow-inner">
                    <button class="join-item btn btn-xs btn-ghost gap-1" data-on-click="layout = 'list'"
                        data-class="{ 'btn-active': layout === 'list' }">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M4 6h16M4 12h16M4 18h16" stroke-width="2" stroke-linecap="round" />
                        </svg> List
                    </button>
                    <button class="join-item btn btn-xs btn-ghost gap-1" data-on-click="layout = 'grid'"
                        data-class="{ 'btn-active': layout === 'grid' }">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M4 4h7v7H4V4zm9 0h7v7h-7V4zM4 13h7v7H4v-7zm9 0h7v7h-7v-7z" stroke-width="2"
                                stroke-linecap="round" />
                        </svg> Grid
                    </button>
                    <button class="join-item btn btn-xs btn-ghost gap-1" data-on-click="layout = 'compact'"
                        data-class="{ 'btn-active': layout === 'compact' }">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M4 8h16M4 16h16" stroke-width="2" stroke-linecap="round" />
                        </svg> Compact
                    </button>
                </div>

                <div class="badge badge-secondary badge-lg font-bold py-3" data-bind="remaining + ' left'"></div>
            </header>

            <!-- Input Group -->
            <div class="relative group w-full">
                <input type="text"
                    class="input input-lg input-bordered w-full pr-[120px] focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-medium"
                    data-bind-value="newTodo" placeholder="What needs to be done?" data-on-keyup:enter="
                        if (newTodo.trim()) {
                            todos.push({ id: Date.now(), text: newTodo.trim(), completed: false });
                            newTodo = '';
                            $saveTodos(todos);
                        }
                    ">
                <button class="btn btn-primary absolute top-1/2 -translate-y-1/2 right-2 px-6 shadow-md" data-on-click="
                        if (newTodo.trim()) {
                            todos.push({ id: Date.now(), text: newTodo.trim(), completed: false });
                            newTodo = '';
                            $saveTodos(todos);
                        }
                    ">Add Task</button>
            </div>

            <!-- Filter Tabs -->
            <div class="flex flex-wrap justify-between items-center gap-4 border-b border-base-300 pb-4 w-full">
                <div class="tabs tabs-boxed bg-base-200 p-1">
                    <a class="tab tab-sm" data-on-click="filter = 'all'"
                        data-class="{ 'tab-active': filter === 'all' }">All</a>
                    <a class="tab tab-sm" data-on-click="filter = 'active'"
                        data-class="{ 'tab-active': filter === 'active' }">Active</a>
                    <a class="tab tab-sm" data-on-click="filter = 'completed'"
                        data-class="{ 'tab-active': filter === 'completed' }">Completed</a>
                </div>
                <button class="btn btn-ghost btn-xs text-error font-bold" data-on-click="showConfirmClear = true">
                    Clear Completed
                </button>
            </div>

            <!-- Todo List Container -->
            <div class="min-h-[300px] transition-all duration-300 w-full" data-class="{
                    'grid grid-cols-2 gap-4': layout === 'grid',
                    'flex flex-col gap-3': layout === 'list',
                    'flex flex-col gap-1.5': layout === 'compact'
                }" data-drag-container="todos" data-spatial="sortable"
                data-drag-class="!opacity-100 !shadow-[0_25px_50px_-12px_rgba(0,0,0,0.25)] scale-105 cursor-grabbing z-[9999]"
                data-drag-ghost-class="opacity-40 bg-base-200 border-2 border-dashed border-base-content/20">

                <!-- Empty State -->
                <div data-if="todos.length === 0"
                    class="flex flex-col items-center justify-center h-40 text-base-content/30 italic col-span-full w-full">
                    <svg class="w-12 h-12 mb-2 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    Ready for your focus...
                </div>

                <!-- Todo Items -->
                <div data-for="todo in filteredTodos" data-key="todo.id" data-animate-flip data-drag
                    class="rounded-2xl transition-all duration-300 flex border border-transparent min-w-0 cursor-move relative group"
                    data-class="{
                        'p-5 flex-col items-center justify-center text-center h-40 bg-base-200': layout === 'grid',
                        'p-4 items-center gap-4 bg-base-200 hover:shadow-md': layout === 'list',
                        'p-2.5 items-center gap-3 text-sm bg-base-200/60 hover:bg-base-200/80': layout === 'compact'
                    }" data-on-click="activeTodo = todo; isEditing = false">

                    <!-- Left area -->
                    <div class="flex-1 flex min-w-0" data-class="{
                            'flex-col items-center w-full': layout === 'grid',
                            'gap-4': layout !== 'grid'
                        }">

                        <!-- Checkbox -->
                        <div data-on-click:stop="" data-class="{ 'absolute top-4 left-4': layout === 'grid' }">
                            <input type="checkbox"
                                class="checkbox checkbox-primary transition-all hover:scale-110 active:scale-125"
                                data-class="{ 'checkbox-lg': layout !== 'compact', 'checkbox-sm': layout === 'compact' }"
                                data-bind-checked="todo.completed" data-on-change="$saveTodos(todos)">
                        </div>

                        <!-- Text -->
                        <span class="font-medium leading-tight select-none text-base-content" data-bind="todo.text"
                            data-class="{
                                'text-lg': layout === 'list',
                                'line-clamp-3 w-full px-4 mt-2': layout === 'grid',
                                'truncate': layout === 'compact',
                                'line-through opacity-50': todo.completed
                            }"></span>
                    </div>

                    <!-- Delete Button -->
                    <div class="flex items-center gap-1 transition-opacity opacity-0 group-hover:opacity-100"
                        data-on-click:stop="" data-class="{ 'absolute top-4 right-4': layout === 'grid' }">
                        <button
                            class="btn btn-circle btn-ghost text-error/40 hover:text-error hover:bg-error/10 transition-all"
                            data-class="{ 'btn-sm': layout !== 'compact', 'btn-xs': layout === 'compact' }"
                            title="Delete Task" data-on-click="activeTodo = todo; showConfirmDelete = true">
                            <iconify-icon icon="material-symbols-light:delete-outline"
                                data-class="{ 'text-xl': layout !== 'compact', 'text-base': layout === 'compact' }"></iconify-icon>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Footer Diagnostics -->
            <footer class="mt-auto px-2 opacity-40 hover:opacity-100 transition-opacity w-full">
                <div class="divider text-[10px] uppercase tracking-tighter">Diagnostic Overlay</div>
                <div class="grid grid-cols-2 gap-2 text-[9px] font-mono lowercase">
                    <div class="bg-base-300 p-2 rounded flex justify-between">
                        <span>viewport</span>
                        <span class="text-primary">
                            <span data-bind="_window.innerWidth"></span>x<span data-bind="_window.innerHeight"></span>
                        </span>
                    </div>
                    <div class="bg-base-300 p-2 rounded flex justify-between">
                        <span>theme</span>
                        <span class="text-secondary" data-bind="$activeMode"></span>
                    </div>
                </div>
            </footer>

        </div>
    </div>

    <!-- Task View/Edit Modal -->
    <div class="modal" data-class="{ 'modal-open': activeTodo && !showConfirmDelete }">
        <div
            class="modal-box bg-base-100 shadow-2xl border border-primary/20 p-0 overflow-hidden flex flex-col max-w-lg">

            <!-- Modal Header -->
            <div class="flex items-center justify-between p-4 border-b border-base-200">
                <span class="font-bold uppercase tracking-widest text-xs text-primary/60"
                    data-bind="isEditing ? 'Edit Task' : 'View Task'"></span>
                <button class="btn btn-ghost btn-xs btn-circle" data-on-click="activeTodo = null">
                    <iconify-icon icon="material-symbols-light:close" class="text-lg"></iconify-icon>
                </button>
            </div>

            <!-- Modal Content -->
            <div class="p-6 flex-1 min-h-[200px] flex flex-col">
                <!-- View Mode -->
                <div data-show="!isEditing"
                    class="max-h-64 overflow-y-auto whitespace-pre-wrap select-text px-2 text-lg leading-relaxed text-base-content"
                    data-bind="activeTodo?.text"></div>

                <!-- Edit Mode -->
                <textarea data-show="isEditing"
                    class="textarea textarea-bordered w-full text-lg font-medium flex-1 min-h-[100px] focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all leading-relaxed"
                    data-bind-value="editTempText" placeholder="Describe your task..."
                    data-effect="if (isEditing && $el) { $el.focus(); $el.select(); }" data-on-keydown:ctrl:enter="
                        if (editTempText.trim()) {
                            activeTodo.text = editTempText.trim();
                            isEditing = false;
                            $saveTodos(todos);
                        }
                    " data-on-keydown:escape="isEditing = false"></textarea>

                <div data-show="isEditing" class="mt-4">
                    <label class="label text-xs uppercase tracking-widest text-primary/60 font-bold">Due Date
                        (DD/MM/YYYY)</label>
                    <input type="text" class="input input-bordered w-full font-mono" data-mask="'##/##/####'"
                        placeholder="DD/MM/YYYY">
                </div>
            </div>

            <!-- Modal Action Bar -->
            <div class="p-4 bg-base-200/50 flex items-center justify-between border-t border-base-200">
                <button class="btn btn-circle btn-ghost text-error/60 hover:text-error hover:bg-error/10 transition-all"
                    title="Delete Task" data-on-click="showConfirmDelete = true">
                    <iconify-icon icon="material-symbols-light:delete-outline" class="text-2xl"></iconify-icon>
                </button>
                <div class="flex items-center gap-2">
                    <div data-show="!isEditing" class="flex gap-2">
                        <button class="btn btn-ghost gap-2 px-6"
                            data-on-click="isEditing = true; editTempText = activeTodo.text">
                            <iconify-icon icon="material-symbols-light:edit-outline" class="text-xl"></iconify-icon>
                            Edit
                        </button>
                        <button class="btn btn-primary px-6 shadow-md" data-on-click="activeTodo = null">Done</button>
                    </div>
                    <div data-show="isEditing" class="flex gap-2">
                        <button class="btn btn-ghost" data-on-click="isEditing = false">Cancel</button>
                        <button class="btn btn-primary px-6 shadow-md" data-on-click="
                                if (editTempText.trim()) {
                                    activeTodo.text = editTempText.trim();
                                    isEditing = false;
                                    $saveTodos(todos);
                                }
                            ">Save</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-backdrop bg-black/60 backdrop-blur-sm" data-on-click="activeTodo = null"></div>
    </div>

    <!-- Confirm Delete / Clear Modal -->
    <div class="modal" data-class="{ 'modal-open': showConfirmDelete || showConfirmClear }">
        <div class="modal-box bg-base-100 shadow-2xl border border-error/20 p-6 flex flex-col gap-4 max-w-sm">
            <h3 class="font-bold text-lg text-error flex items-center gap-2">
                <iconify-icon icon="material-symbols-light:warning-rounded" class="text-2xl"></iconify-icon>
                <span data-bind="showConfirmDelete ? 'Confirm Delete' : 'Confirm Clear'"></span>
            </h3>
            <p class="text-base-content/70"
                data-bind="showConfirmDelete ? 'Are you sure you want to permanently remove this task? This action cannot be undone.' : 'Are you sure you want to clear all completed tasks?'">
            </p>
            <div class="flex justify-end gap-3 mt-4">
                <button class="btn btn-ghost btn-sm"
                    data-on-click="showConfirmDelete = false; showConfirmClear = false; activeTodo = null">No, Keep
                    it</button>
                <button class="btn btn-error btn-sm text-white px-6 shadow-md" data-on-click="
                        if (showConfirmDelete) {
                            todos = todos.filter(t => t.id !== activeTodo.id);
                            activeTodo = null;
                        } else {
                            todos = todos.filter(t => !t.completed);
                        }
                        $saveTodos(todos);
                        showConfirmDelete = false;
                        showConfirmClear = false;
                    ">Yes, <span data-bind="showConfirmDelete ? 'Delete' : 'Clear'"></span></button>
            </div>
        </div>
        <div class="modal-backdrop bg-black/60 backdrop-blur-sm"
            data-on-click="showConfirmDelete = false; showConfirmClear = false"></div>
    </div>

</body>

</html>
