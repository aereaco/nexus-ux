<!DOCTYPE html>
<html lang="en"
      data-ux-init
      data-theme="synthwave"
      data-ingest="{ 
        'DaisyUI': { 
          link: [
            { href: 'https://cdn.jsdelivr.net/npm/daisyui@5' },
            { href: 'https://cdn.jsdelivr.net/npm/daisyui@5/themes.css' }
          ] 
        }, 
        'Tailwind': { 
          script: { src: 'https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4' }
        },
        'Iconify': { 
          script: { src: 'https://cdn.jsdelivr.net/npm/iconify-icon@3.0.0/dist/iconify-icon.min.js' }
        }
      }"
      data-signal="{

          appReady: false
      }">
<head>
    <meta charset="UTF-8">
    <title>Nexus-UX</title>
    <script type="module" src="../dist/nexus-ux1.js"></script>
    <style>
        /* Progress Bar */
        .nexus-progress-mount { position: fixed; top: 0; left: 0; right: 0; z-index: 9999; }
        progress { appearance: none; -webkit-appearance: none; border: none; background: transparent; height: 0.5rem; margin: 0; display: block; }
        progress::-webkit-progress-bar { background-color: rgba(166, 173, 187, 0.2); }
        progress::-webkit-progress-value { background-color: #570df8; }
        progress::-moz-progress-bar { background-color: #570df8; }

        /* Main Layout */
        main.nx-main { opacity: 0; transition: opacity 0.5s ease-in; }
        .nexus-ready main.nx-main { opacity: 1; }
    </style>
</head>
<body class="bg-base-200 min-h-screen font-sans antialiased text-base-content" data-on-load.window="appReady = true">
  <div class="nexus-progress-mount" data-class="{ 'hidden': appReady }">
    <progress class="progress progress-primary w-full"></progress>
  </div>

  <main class="nx-main" data-class="{ 'nexus-ready': appReady }">
    <div data-component="'_components/layout.html'"></div>
  </main>
</body>
</html>
