    <div class="dashboard-fragment" 
    data-ingest="{ 
        'DaisyUI': { 
          link: [
            { href: 'https://cdn.jsdelivr.net/npm/daisyui@5' },
            { href: 'https://cdn.jsdelivr.net/npm/daisyui@5/themes.css' }
          ] 
        }, 
        'Tailwind': { 
          script: { src: 'https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4' }
        },
        'CodeMirror': { 
          script: { src: '/site/dashboard/assets/cm.js', type: 'module' }
        } 
      }"
    data-signal="{ 
        toastMsg: '', 
        toastType: 'info', 
        showToast: false,
        syntaxTab: 'usage',
        demoTab: 'preview',
        activeFork: 'Default',
        activeSnippet: 'Default',
        showForkModal: false,
        showSnippetModal: false,
        forkName: '',
        snippetName: '',
        forkError: '',
        snippetError: '',
        forkSource: '',
        forkCode: '',
        snippetCode: '',
        forks: [],
        snippets: [],
        forksLoaded: false,
        snippetsLoaded: false,
        manageTarget: '',
        newName: '',
        showRenameForkModal: false,
        showDeleteForkModal: false,
        showRenameSnippetModal: false,
        showDeleteSnippetModal: false,
        manageError: '',
        baseSnippets: []
     }" data-effect="
        if (doc) {
            // Populate base snippets from doc definition
            if (baseSnippets.length === 0) {
                const bases = [];
                if (doc.Examples) {
                    Object.keys(doc.Examples).forEach(k => bases.push(k));
                } else if (doc.Snippet) {
                    bases.push(doc.DefaultSnippetName || 'Default');
                }
                baseSnippets = bases;
                if (bases.length > 0 && activeSnippet === 'Default') activeSnippet = bases[0];
            }

            // Immediate sync to avoid waiting for editors to populate the preview
            if (!snippetCode && doc.Examples && doc.Examples[activeSnippet]) {
                snippetCode = doc.Examples[activeSnippet];
            } else if (!snippetCode && doc.Snippet && activeSnippet === (doc.DefaultSnippetName || 'Default')) {
                snippetCode = doc.Snippet;
            }

            if (activeFork === 'Default' && forkSource && !forkCode) forkCode = forkSource;

            if (!forkSource && doc.SourceModule) {
                $get('/src' + doc.SourceModule, { responseType: 'text' }).then(d => {
                    forkSource = d;
                    if (activeFork === 'Default') forkCode = d;
                });
            }

            // Initialize lists from mirrors explicitly
            if (_indexedDB?.forks && !forksLoaded) {
                forksLoaded = true;
                _indexedDB.forks.list(doc.SourceModule + '_').then(keys => {
                    forks = keys.map(k => k.substring(doc.SourceModule.length + 1));
                });
            }
            if (_indexedDB?.snippets && !snippetsLoaded) {
                snippetsLoaded = true;
                _indexedDB.snippets.list(doc.SnippetModule + '_').then(keys => {
                    snippets = keys.map(k => k.substring(doc.SnippetModule.length + 1));
                });
            }
        }

        // ZCZS: Singleton registration + dispatch callback + cleanup
        // Mount editors — gates on both CM singleton and reactive forkSource data
        const mountEditors = () => {
            if (!window.CM || !forkSource) return;

            const { EditorView, EditorState, Compartment, basicSetup, javascript, html, oneDark } = window.CM;

            // Source Editor — singleton init
            if (!window._sourceEditor) {
                const readOnly = new Compartment();
                window._sourceEditor = new EditorView({
                    state: EditorState.create({
                        doc: forkSource,
                        extensions: [
                            basicSetup,
                            javascript(),
                            oneDark,
                            EditorView.lineWrapping,
                            readOnly.of(EditorState.readOnly.of(true)),
                            EditorView.updateListener.of(update => {
                                if (update.docChanged) {
                                    const val = update.state.doc.toString();
                                    if (forkCode !== val) forkCode = val;
                                }
                            })
                        ]
                    }),
                    parent: document.getElementById('source-editor')
                });

                $watch(() => forkCode, (code) => {
                    if (code !== undefined && window._sourceEditor.state.doc.toString() !== code) {
                        window._sourceEditor.dispatch({
                             changes: { from: 0, to: window._sourceEditor.state.doc.length, insert: code || '' }
                        });
                    }
                });

                $watch(() => activeFork, (fork) => {
                    if (fork === 'Default') {
                        forkCode = forkSource;
                    } else {
                        _indexedDB.forks.get(doc.SourceModule + '_' + fork).then(val => {
                            forkCode = val || forkSource || '';
                        });
                    }
                    window._sourceEditor.dispatch({
                        effects: readOnly.reconfigure(EditorState.readOnly.of(fork === 'Default'))
                    });
                });
            }

            // Snippet Editor — singleton init
            if ((doc?.Snippet || doc?.Examples) && !window._snippetEditor) {
                const snippetReadOnly = new Compartment();
                window._snippetEditor = new EditorView({
                    state: EditorState.create({
                        doc: snippetCode || '',
                        extensions: [
                            basicSetup,
                            html(),
                            oneDark,
                            EditorView.lineWrapping,
                            snippetReadOnly.of(EditorState.readOnly.of(activeSnippet === 'Default')),
                            EditorView.updateListener.of(update => {
                                if (update.docChanged) {
                                    const val = update.state.doc.toString();
                                    if (snippetCode !== val) snippetCode = val;
                                }
                            })
                        ]
                    }),
                    parent: document.getElementById('snippet-editor')
                });

                $watch(() => snippetCode, (code) => {
                    if (code !== undefined && window._snippetEditor.state.doc.toString() !== code) {
                        window._snippetEditor.dispatch({
                             changes: { from: 0, to: window._snippetEditor.state.doc.length, insert: code || '' }
                        });
                    }
                });

                $watch(() => activeSnippet, (snippet) => {
                    if (doc.Examples && doc.Examples[snippet]) {
                        snippetCode = doc.Examples[snippet];
                    } else if (snippet === (doc.DefaultSnippetName || 'Default')) {
                        snippetCode = doc.Snippet;
                    } else {
                        _indexedDB.snippets.get(doc.SnippetModule + '_' + snippet).then(val => {
                            snippetCode = val || doc.Snippet || '';
                        });
                    }
                    window._snippetEditor.dispatch({
                        effects: snippetReadOnly.reconfigure(EditorState.readOnly.of(baseSnippets.includes(snippet)))
                    });
                });
            }
        };

        // Store latest mount closure on element — allows the one-shot listener
        // to always invoke the freshest closure (no stale captures)
        $el._mountEditors = mountEditors;

        // Try synchronous mount (CM already loaded + forkSource available)
        if (window.CM) mountEditors();

        // If CM not yet loaded, register ONE listener (singleton guard on element)
        if (!window.CM && !$el._cmListenerRegistered) {
            $el._cmListenerRegistered = true;
            window.addEventListener('nexus:cm-ready', () => $el._mountEditors?.(), { once: true });
        }
    ">
    <style>

        progress::-webkit-progress-bar { background-color: rgba(166, 173, 187, 0.2); }

        main.nx-main { opacity: 0; transition: opacity 0.5s ease-in; position: relative; padding: 1.5rem; }

        .nx-editor-container { position: relative; min-height: 400px; width: 100%; }
        .nx-editor { position: absolute; top: 0; left: 0; right: 0; bottom: 0; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 14px; }

                                <li><a data-on-click="activeFork = 'Default'; if (document.activeElement instanceof HTMLElement) document.activeElement.blur()"

                                                        <path stroke-linecap="round" stroke-linejoin="round"

                                                    </svg>

            <div class="card bg-base-100 shadow-xl border border-base-300 mb-8">

                        class="flex flex-col md:flex-row justify-between md:items-center border-b border-base-300 pb-4 mb-4 gap-4">
                        <h2 class="card-title text-secondary flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23-.693L5 14.5m14.8.8l1.402 1.402c1.232 1.232.65 3.318-1.067 3.611A48.309 48.309 0 0112 21c-2.773 0-5.491-.235-8.135-.687-1.718-.293-2.3-2.379-1.067-3.61L5 14.5" /></svg>
                            Interactive Demonstration
                        </h2>
                        <div class="join bg-base-200 p-1">
                            <!-- Preview Icon -->
                            <button class="join-item btn btn-sm tooltip tooltip-top" data-tip="Preview" 
                                data-class-btn-primary="demoTab === 'preview'"

                                const a = document.createElement('a');
                                a.href = url;

                                    _indexedDB.snippets[doc.SnippetModule + '_' + activeSnippet] = snippetCode;
                                    toastMsg = 'Snippet saved: ' + activeSnippet; toastType = 'success'; showToast = true;

                                        snippetCode = val || (doc.Examples && doc.Examples[activeSnippet]) || doc.Snippet || '';

                            </svg> Reset
                        </button>

                <!-- Snippet Modal -->
                <template data-if="showSnippetModal">
                    <div class="fixed inset-0 bg-black/50 z-[9998] flex items-center justify-center">
                        <div class="card bg-base-100 shadow-2xl border border-base-300 max-w-md w-full mx-4">
                            <div class="card-body">
                                <h3 class="card-title text-secondary">Save Snippet</h3>
                                <p class="py-2 opacity-70">Save this demo template under a name:</p>
                                <input type="text" class="input input-bordered input-secondary w-full"
                                    data-bind="snippetName" placeholder="nested-signals-test">

                                    if (!name) { snippetError = 'Name is required'; return; }
                                    if (baseSnippets.includes(name)) { snippetError = 'Reserved name'; return; }
                                    if (snippets.indexOf(name) !== -1) { snippetError = 'Already exists'; return; }
                                    _indexedDB.snippets[doc.SnippetModule + '_' + name] = snippetCode;
                                    snippets.push(name);
                                    activeSnippet = name;
                                    showSnippetModal = false;
                                    toastMsg = 'Snippet saved: ' + name; toastType = 'success'; showToast = true;

                        <div class="card bg-base-100 shadow-2xl border border-base-300 max-w-md w-full mx-4">
                            <div class="card-body">
                                <h3 class="card-title text-info">Rename Fork</h3>
                                <p class="py-2 opacity-70 text-sm italic">Original: <span class="font-bold"
                                        data-bind="manageTarget"></span></p>
                                <input type="text" class="input input-bordered input-info w-full" data-bind="newName"
                                    placeholder="new-branch-name">
                                <div class="card-actions justify-end mt-4">
                                    <button class="btn btn-ghost"
                                        data-on-click="showRenameForkModal = false">Cancel</button>
                                    <button class="btn btn-info" data-on-click="
                                const store = _indexedDB.forks;
                                const prefix = doc.SourceModule;
                                const oldKey = prefix + '_' + manageTarget;
                                const newKey = prefix + '_' + newName;
                                store.get(oldKey).then(code => {
                                    if (code === undefined) { toastMsg = 'Error: Source not loaded'; toastType = 'error'; showToast = true; return; }
                                    store.set(newKey, code).then(() => {
                                        store.delete(oldKey).then(() => {
                                            const idx = forks.indexOf(manageTarget);
                                            if (idx !== -1) forks.splice(idx, 1, newName);
                                            if (activeFork === manageTarget) activeFork = newName;
                                            toastMsg = 'Renamed to ' + newName; toastType = 'success'; showToast = true;
                                            showRenameForkModal = false;
                                        });
                                    });
                                });
                            ">Rename</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                    data-effect="if (showToast) setTimeout(() => showToast = false, 3000)">
                    <div class="alert shadow-lg" data-class-alert-success="toastType === 'success'"
                        data-class-alert-info="toastType === 'info'" data-class-alert-warning="toastType === 'warning'">
                        <span data-bind="toastMsg" class="font-bold"></span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
