<!DOCTYPE html>
<html lang="en" data-theme="dark" data-debug data-ux-init>
<head>
    <meta charset="UTF-8">
    <title>Debug Interaction | Nexus-UX</title>
    <script type="module" src="/dist/nexus-ux.js"></script>
    <style>
        .box { width: 100px; height: 100px; background: red; position: absolute; }
        .flow { width: 500px; height: 500px; border: 1px solid white; position: relative; overflow: hidden; }
    </style>
</head>
<body class="p-8">
    <div data-var="{ list: [{t: 'A'}, {t: 'B'}], nodes: [{id: 1, x: 50, y: 50, t: 'N1'}, {id: 2, x: 200, y: 200, t: 'N2'}] }">
        
        <h2>Sortable</h2>
        <div data-for="item in list" class="p-2 bg-gray-800 mb-1" data-drag>
           <span data-bind="item.t"></span>
        </div>

        <h2 class="mt-8">Flow</h2>
        <div class="flow" data-flow="{x:0, y:0, zoom:1}">
            <div class="nexus-flow-content">
                <div data-for="node in nodes" 
                     data-bind-id="`node-${node.id}`"
                     class="box"
                     data-node="node">
                    <span data-bind="node.t"></span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
