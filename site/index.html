<!DOCTYPE html>
<html lang="en" data-ux-init data-debug data-stylesheet data-theme="dark"
      data-import="{ 
        'DaisyUI': { 
          link: [
            { href: 'https://cdn.jsdelivr.net/npm/daisyui@5' },
            { href: 'https://cdn.jsdelivr.net/npm/daisyui@5/themes.css' }
          ] 
        }, 
        'Iconify': { 
          script: { src: 'https://cdn.jsdelivr.net/npm/iconify-icon@3.0.0/dist/iconify-icon.min.js' }
        }
      }" data-signal="{ appReady: false }"
      
      data-ux-theme="{
        default: 'auto',
        modes: {
            auto:  { icon: 'material-symbols-light:light-mode-auto-outline' },
            light: { icon: 'material-symbols-light:light-mode-outline', theme: 'fantasy' },
            dark:  { icon: 'material-symbols-light:dark-mode-outline', theme: 'dracula' }
        }
      }"
      >
      

<head>
  <meta charset="UTF-8">
  <title>Nexus-UX</title>
  <!-- Relative base so the SAME document works whether the server is rooted
       at the repo (/site/ is a subdir) or directly at /site/. A relative
       base keeps _components/, _pages/ and _assets/ fetches resolving
       against wherever index.html is actually served from. The router's
       autoDetectBasePath reads this. -->
  <base href="/">
  <script type="module" src="./dist/nexus-ux.js"></script>
  <link rel="icon" type="image/svg+xml" href="./_assets/images/emblem.svg">
  <style>
    /* Progress Bar */
    .nexus-progress-mount {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
    }

    progress {
      appearance: none;
      -webkit-appearance: none;
      border: none;
      background: transparent;
      height: 0.5rem;
      margin: 0;
      display: block;
    }

    progress::-webkit-progress-bar {
      background-color: rgba(166, 173, 187, 0.2);
    }

    progress::-webkit-progress-value {
      background-color: #570df8;
    }

    progress::-moz-progress-bar {
      background-color: #570df8;
    }

    /* Main Layout */
    main.nx-main {
      opacity: 0;
      transition: opacity 0.5s ease-in;
    }

    main.nx-main.nexus-ready {
      opacity: 1;
    }
  </style>
</head>
              
<body class="bg-gradient-to-br from-base-200 via-base-100 to-base-300 min-h-screen font-sans antialiased text-base-content" data-on-load:window="appReady = true">
  <div class="nexus-progress-mount" data-class="{ 'hidden': appReady }">
    <progress class="progress progress-primary w-full"></progress>
  </div>

  <main class="nx-main" data-class="{ 'nexus-ready': appReady }">
    <div data-component="'_components/layout.html'"></div>
  </main>

</body>

</html>
