<!-- Single error-handling page for ALL errors — 404 and 5xx alike.
     There is no separate 404 page: `router.errorCode` carries the code
     ('404' for not-found, '500'/'502'/'503'/'504'… for server
     errors) and this one page switches its icon/title/copy by code.
     `pagesDir` is declared in data-router; nothing is hardcoded. -->
<div class="flex flex-col items-center justify-center min-h-dvh gap-4 text-center p-8"
     data-signal="{ code: (#router.errorCode || '404') }">
  <iconify-icon
    data-bind-icon="code === '404' ? 'material-symbols-light:search-check-outline' :
                   (code === '503' ? 'material-symbols-light:hourglass-top-outline' :
                   (code === '504' ? 'material-symbols-light:timer-outline' :
                   (code === '502' ? 'material-symbols-light:swap-horizontal-outline' :
                   'material-symbols-light:cloud-off-outline')))"
    class="text-6xl text-error"></iconify-icon>
  <h1 class="text-3xl font-bold" data-bind="code"></h1>
  <p class="text-base-content/70 max-w-md"
     data-bind="code === '404' ? 'The page you were looking for could not be found.' :
                (code === '500' ? 'Something went wrong on our end. Please try again.' :
                (code === '502' ? 'Bad gateway — the server received an invalid response.' :
                (code === '503' ? 'Service temporarily unavailable. Please try again shortly.' :
                (code === '504' ? 'Gateway timeout — the server took too long to respond.' :
                'An unexpected error occurred.'))))"></p>
  <a href="/" class="btn btn-primary" data-tab-title="Home" data-tab-icon="material-symbols-light:home-outline">Back to Home</a>
</div>
