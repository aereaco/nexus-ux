<div class="p-8 bg-base-200 rounded-box border shadow-inner">
    <h3 class="font-bold text-xl uppercase opacity-60 flex items-center gap-2 mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M15 11.25l-3-3m0 0l-3 3m3-3v7.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        Inherited Parent Data
    </h3>
    
    <div class="stats bg-base-100 shadow mb-8 border border-base-300 w-full">
        <div class="stat">
            <div class="stat-title border-b border-base-200 pb-2 mb-2">Cluster ID</div>
            <div class="stat-value text-primary font-mono text-3xl" data-text="cluster.id"></div>
        </div>
        <div class="stat">
            <div class="stat-title border-b border-base-200 pb-2 mb-2">Active Nodes</div>
            <div class="stat-value text-secondary text-3xl" data-text="cluster.nodes"></div>
            <div class="stat-desc mt-3 flex gap-2">
                <button class="btn btn-sm btn-outline" data-on-click="cluster.nodes++">Add Node</button>
                <button class="btn btn-sm btn-outline" data-on-click="cluster.nodes--">Terminate Node</button>
            </div>
        </div>
    </div>
    
    <div data-signal="{ activeProcess: 'Training Model X' }" class="p-6 bg-accent/10 rounded-xl border border-accent/40 shadow">
        <h3 class="font-bold text-xl text-accent mb-4">Nested Boundaries</h3>
        <p class="mb-4 text-sm opacity-80">Internal nodes map local state while inheriting parent data seamlessly.</p>
        <div class="form-control mb-4">
            <label class="label"><span class="label-text font-bold">Child Signal (activeProcess)</span></label>
            <input type="text" data-model="activeProcess" class="input input-bordered input-accent">
        </div>
        <div class="form-control">
            <label class="label"><span class="label-text font-bold">Parent Signal Accessible (cluster.id)</span></label>
            <input type="text" data-model="cluster.id" class="input input-bordered input-primary">
        </div>
    </div>
</div>
